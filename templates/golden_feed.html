<!DOCTYPE html>
<html>
<head>
    <title>🏆 Золотой Контент | BearGram</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
        
        body{
            background:linear-gradient(135deg, #fff5f5 0%, #ffe0e6 50%, #ffd6e0 100%);
            color:#333;
            height:100vh;
            overflow:hidden;
            touch-action:pan-y;
        }
        
        .hearts-bg{
            position:fixed;
            top:0;left:0;width:100%;height:100%;
            pointer-events:none;
            z-index:0;
            overflow:hidden;
        }
        .heart{
            position:absolute;
            font-size:20px;
            animation:floatUp 8s infinite;
            opacity:0;
        }
        @keyframes floatUp{
            0%{transform:translateY(100vh) scale(0);opacity:0}
            10%{opacity:0.15}
            90%{opacity:0.15}
            100%{transform:translateY(-10vh) scale(1);opacity:0}
        }
        
        .app-container{
            position:relative;
            z-index:1;
            height:100vh;
            display:flex;
            flex-direction:column;
        }
        
        .top-bar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:6px 15px;
            background:rgba(255,255,255,0.75);
            backdrop-filter:blur(8px);
            position:absolute;
            top:0;left:0;right:0;
            z-index:10;
            border-bottom:1px solid rgba(255,107,107,0.15);
            gap:10px;
        }
        .back-btn{
            background:none;
            border:none;
            color:#ff6b6b;
            font-size:18px;
            cursor:pointer;
            padding:4px 8px;
            text-decoration:none;
            font-weight:bold;
        }
        .logo-text{
            font-size:13px;
            font-weight:bold;
            color:#ff6b6b;
            flex:1;
        }
        .fund-badge{
            background:linear-gradient(135deg, #ffd700, #ffaa00);
            color:#000;
            border-radius:20px;
            padding:4px 12px;
            font-size:11px;
            font-weight:bold;
            box-shadow:0 2px 6px rgba(255,170,0,0.3);
        }
        
        .swipe-container{
            flex:1;
            overflow-y:scroll;
            scroll-snap-type:y mandatory;
            -webkit-overflow-scrolling:touch;
            padding-top:40px;
            padding-bottom:60px;
        }
        .swipe-container::-webkit-scrollbar{display:none}
        
        .video-card{
            height:100vh;
            scroll-snap-align:start;
            display:flex;
            align-items:center;
            justify-content:center;
            position:relative;
            background:transparent;
        }
        .video-card video{
            width:100%;
            height:100%;
            object-fit:cover;
            border-radius:0;
            filter: contrast(1.1) saturate(1.2) brightness(1.05);
            -webkit-filter: contrast(1.1) saturate(1.2) brightness(1.05);
        }
        
        .video-overlay{
            position:absolute;
            bottom:60px;
            left:12px;
            z-index:5;
            background:rgba(0,0,0,0.5);
            backdrop-filter:blur(4px);
            border-radius:10px;
            padding:8px 12px;
            max-width:70%;
        }
        .video-title{
            font-weight:bold;
            font-size:14px;
            color:#fff;
        }
        .video-author{
            font-size:11px;
            color:rgba(255,255,255,0.9);
            margin-top:2px;
        }
        
        .side-actions{
            position:absolute;
            right:10px;
            bottom:100px;
            display:flex;
            flex-direction:column;
            gap:20px;
            z-index:5;
        }
        .side-btn{
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:5px;
            cursor:pointer;
            transition:0.2s;
        }
        .side-btn:hover{transform:scale(1.1)}
        .side-btn .icon{
            width:40px;
            height:40px;
            border-radius:50%;
            background:rgba(255,255,255,0.9);
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:20px;
            box-shadow:0 2px 6px rgba(0,0,0,0.12);
        }
        .side-btn .count{
            font-size:11px;
            font-weight:bold;
            color:#fff;
            text-shadow:0 1px 3px rgba(0,0,0,0.5);
        }
        .side-btn.liked .icon{background:#ff4444}
        .side-btn.liked .count{color:#ff9999}
        
        @keyframes likePop{
            0%{transform:scale(1)}
            50%{transform:scale(1.3)}
            100%{transform:scale(1)}
        }
        .side-btn.liked .icon{animation:likePop 0.3s ease}
        
        .bottom-bar{
            display:flex;
            justify-content:center;
            align-items:center;
            padding:8px;
            background:rgba(255,255,255,0.8);
            backdrop-filter:blur(10px);
            position:absolute;
            bottom:0;left:0;right:0;
            z-index:10;
            border-top:1px solid rgba(255,107,107,0.12);
        }
        .bottom-btn.primary{
            background:#ff6b6b;
            color:white;
            border:none;
            padding:6px 20px;
            border-radius:20px;
            cursor:pointer;
            font-size:12px;
            font-weight:bold;
        }
        
        .comments-panel{
            position:fixed;
            bottom:0;
            left:0;
            right:0;
            background:white;
            border-radius:20px 20px 0 0;
            padding:20px;
            z-index:20;
            transform:translateY(100%);
            transition:0.3s ease;
            max-height:60vh;
            display:flex;
            flex-direction:column;
        }
        .comments-panel.active{transform:translateY(0)}
        .comments-header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:15px;
        }
        .comments-list{
            flex:1;
            overflow-y:auto;
            margin-bottom:10px;
        }
        .comment-item{
            display:flex;
            gap:10px;
            padding:10px 0;
            border-bottom:1px solid #f0f0f0;
            align-items:flex-start;
        }
        .comment-avatar{
            width:32px;
            height:32px;
            border-radius:50%;
            background:linear-gradient(135deg,#ff9a9e,#fecfef);
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:14px;
            flex-shrink:0;
        }
        .comment-content{flex:1}
        .comment-name{font-weight:bold;font-size:13px}
        .comment-text{font-size:13px;color:#666}
        .comment-time{font-size:10px;color:#999}
        .comment-input-row{
            display:flex;
            gap:10px;
            align-items:center;
        }
        .comment-input-row input{
            flex:1;
            padding:10px;
            border-radius:20px;
            border:1px solid #ffb3b3;
            outline:none;
        }
        .comment-input-row button{
            background:#ff6b6b;
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:20px;
            cursor:pointer;
        }
    </style>
</head>
<body>
    <div class="hearts-bg" id="heartsBg"></div>
    
    <div class="app-container">
        <div class="top-bar">
            <a href="/chat" class="back-btn">←</a>
            <div class="logo-text">🏆 Золотой Контент</div>
            <div class="fund-badge" id="fundBadge">75 000 💎</div>
        </div>
        
        <div class="swipe-container" id="swipeContainer">
            {% for video in videos %}
            <div class="video-card" data-video-id="{{ video.id }}">
                <video src="{{ video.file_path }}" preload="metadata" playsinline loop id="video-{{ video.id }}"></video>
                
                <div class="video-overlay">
                    <div class="video-title">{{ video.title or 'Без названия' }}</div>
                    <div class="video-author">@{{ video.author.username }}</div>
                </div>
                
                <div class="side-actions">
                    <div class="side-btn" id="likeBtn-{{ video.id }}" onclick="toggleLike({{ video.id }})">
                        <div class="icon">❤️</div>
                        <div class="count" id="likes-{{ video.id }}">0</div>
                    </div>
                    <div class="side-btn" onclick="showComments({{ video.id }})">
                        <div class="icon">💬</div>
                        <div class="count" id="commentCount-{{ video.id }}">0</div>
                    </div>
                    <div class="side-btn" onclick="donateToVideo({{ video.id }})">
                        <div class="icon" style="background:#ffd700;">💎</div>
                        <div class="count" style="color:#ffd700;">Донат</div>
                    </div>
                    <div class="side-btn">
                        <div class="icon">👁</div>
                        <div class="count" id="views-{{ video.id }}">{{ video.views_count }}</div>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
        
        <div class="bottom-bar">
            <button class="bottom-btn primary" onclick="document.getElementById('uploadInput').click()">📤 Загрузить видео</button>
        </div>
    </div>
    
    <div class="comments-panel" id="commentsPanel">
        <div class="comments-header">
            <h3>💬 Комментарии</h3>
            <button onclick="closeComments()" style="background:none;border:none;font-size:20px;cursor:pointer;">✖</button>
        </div>
        <div class="comments-list" id="commentsList">
            <p style="color:#888;text-align:center;">Загрузка...</p>
        </div>
        <div class="comment-input-row">
            <input type="text" id="commentInput" placeholder="Написать комментарий...">
            <button onclick="addComment()">→</button>
        </div>
    </div>
    
    <input type="file" id="uploadInput" accept="video/*" style="display:none" onchange="handleBearFlexUpload(this)">

    <script>
        let currentVideoId = null;
        
        function createHearts(){
            const c=document.getElementById('heartsBg');
            const e=['💕','❤️','💗','💖','💝','💘','💓','🩷','💞','💟'];
            for(let i=0;i<20;i++){
                const h=document.createElement('span');
                h.className='heart';
                h.innerHTML=e[Math.floor(Math.random()*e.length)];
                h.style.left=Math.random()*100+'%';
                h.style.animationDelay=Math.random()*8+'s';
                h.style.fontSize=(15+Math.random()*25)+'px';
                c.appendChild(h);
            }
        }
        createHearts();
        
        const observer=new IntersectionObserver((entries)=>{
            entries.forEach(entry=>{
                const video=entry.target.querySelector('video');
                if(!video)return;
                if(entry.isIntersecting){
                    video.play().catch(()=>{});
                    const videoId=entry.target.dataset.videoId;
                    if(videoId){
                        countView(videoId);
                        updateCommentCount(videoId);
                        updateLikeStatus(videoId);
                    }
                }else{
                    video.pause();
                }
            });
        },{threshold:0.7});
        
        document.querySelectorAll('.video-card').forEach(card=>{
            observer.observe(card);
            const video=card.querySelector('video');
            if(video){
                video.addEventListener('click',()=>{
                    video.paused?video.play():video.pause();
                });
            }
        });
        
        async function countView(videoId){
            await fetch(`/golden/view/${videoId}`,{method:'POST'});
            updateFundProgress();
        }
        
        async function updateCommentCount(videoId){
            const res=await fetch(`/golden/comments_count/${videoId}`);
            const data=await res.json();
            document.getElementById(`commentCount-${videoId}`).innerText=data.count||0;
        }
        
        async function updateLikeStatus(videoId){
            const res=await fetch(`/golden/likes_count/${videoId}`);
            const data=await res.json();
            const btn=document.getElementById(`likeBtn-${videoId}`);
            const countEl=document.getElementById(`likes-${videoId}`);
            countEl.innerText=data.count||0;
            if(data.liked)btn.classList.add('liked');
            else btn.classList.remove('liked');
        }
        
        async function toggleLike(videoId){
            await fetch(`/golden/like/${videoId}`,{method:'POST'});
            updateLikeStatus(videoId);
        }
        
        async function donateToVideo(videoId){
            const amount=prompt('Сумма доната (минимум 50 💎):','50');
            if(!amount||parseInt(amount)<50)return;
            const formData=new FormData();
            formData.append('amount',amount);
            const res=await fetch(`/golden/donate_to_video/${videoId}`,{
                method:'POST',
                body:formData
            });
            const data=await res.json();
            if(data.success){
                alert(`Спасибо! Вы поддержали автора на ${data.amount} 💎`);
                updateFundProgress();
            }else{
                alert(data.error||'Ошибка');
            }
        }
        
        function showComments(videoId){
            currentVideoId=videoId;
            document.getElementById('commentsPanel').classList.add('active');
            loadComments(videoId);
        }
        
        function closeComments(){
            document.getElementById('commentsPanel').classList.remove('active');
            currentVideoId=null;
        }
        
        async function loadComments(videoId){
            const list=document.getElementById('commentsList');
            const res=await fetch(`/golden/comments/${videoId}`);
            const comments=await res.json();
            if(comments.length===0){
                list.innerHTML='<p style="color:#888;text-align:center;">Пока нет комментариев</p>';
                return;
            }
            list.innerHTML=comments.map(c=>`
                <div class="comment-item">
                    <div class="comment-avatar">🐻</div>
                    <div class="comment-content">
                        <div class="comment-name">${escapeHtml(c.username)}</div>
                        <div class="comment-text">${escapeHtml(c.text)}</div>
                        <div class="comment-time">${c.created_at}</div>
                    </div>
                </div>
            `).join('');
        }
        
        async function addComment(){
            const input=document.getElementById('commentInput');
            const text=input.value.trim();
            if(!text||!currentVideoId)return;
            
            const formData=new FormData();
            formData.append('text',text);
            const res=await fetch(`/golden/comment/${currentVideoId}`,{
                method:'POST',
                body:formData
            });
            const data=await res.json();
            if(data.success){
                input.value='';
                loadComments(currentVideoId);
                updateCommentCount(currentVideoId);
            }else{
                alert(data.error||'Ошибка');
            }
        }
        
        function escapeHtml(t){
            if(!t)return'';
            const div=document.createElement('div');
            div.textContent=t;
            return div.innerHTML;
        }
        
        // ===== НОВАЯ ЗАГРУЗКА КАК В TIKTOK =====
        async function handleBearFlexUpload(input) {
            const file = input.files[0];
            if (!file) return;

            if (file.size > 100 * 1024 * 1024) {
                alert('Видео слишком большое! Максимум 100 МБ.');
                input.value = '';
                return;
            }

            const video = document.createElement('video');
            video.preload = 'metadata';
            video.src = URL.createObjectURL(file);

            video.onloadedmetadata = async function() {
                URL.revokeObjectURL(video.src);
                if (video.duration > 60) {
                    alert('Видео слишком длинное! Максимум 60 секунд.');
                    input.value = '';
                    return;
                }
                if (video.videoWidth < 1280 || video.videoHeight < 720) {
                    alert(`Минимальное разрешение 720p. Ваше: ${video.videoWidth}x${video.videoHeight}`);
                    input.value = '';
                    return;
                }

                const title = prompt('Название видео:');
                if (!title) {
                    alert('Название обязательно!');
                    input.value = '';
                    return;
                }

                const fd = new FormData();
                fd.append('video', file);
                fd.append('title', title);
                try {
                    const res = await fetch('/golden/upload', { method: 'POST', body: fd });
                    const data = await res.json();
                    if (data.success) {
                        alert('Видео загружено и будет обработано сервером до 720p.');
                        location.reload();
                    } else {
                        alert(data.error || 'Ошибка загрузки');
                    }
                } catch(e) {
                    alert('Сетевая ошибка');
                }
            };

            video.onerror = () => {
                alert('Не удалось прочитать видео. Файл повреждён.');
                input.value = '';
            };
        }
        
        async function updateFundProgress(){
            const res=await fetch('/golden/fund_status');
            const data=await res.json();
            if(data.active){
                document.getElementById('fundBadge').innerText=`💰 ${data.pool} 💎`;
            }
        }
        
        updateFundProgress();
        setInterval(updateFundProgress,30000);
    </script>
</body>
</html>
