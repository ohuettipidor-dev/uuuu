<!DOCTYPE html>
<html>
<head>
    <title>🐻 Регистрация | BearGram</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fbc2eb 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card{
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 40px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.5);
        }
        h2{
            text-align: center;
            margin-bottom: 24px;
            color: #333;
            font-size: 28px;
        }
        h2 span{color:#ff6b6b}
        .form-group{
            margin-bottom: 20px;
        }
        input{
            width: 100%;
            padding: 14px 18px;
            border: 1px solid #ffb3b3;
            border-radius: 30px;
            font-size: 15px;
            background: white;
            transition: all 0.3s;
        }
        input:focus{
            outline: none;
            border-color: #ff6b6b;
            box-shadow: 0 0 0 3px rgba(255,107,107,0.1);
        }
        small{
            display: block;
            margin-top: 5px;
            color: #aaa;
            font-size: 12px;
        }
        button{
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        button:hover{
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255,107,107,0.3);
        }
        .alert{
            padding: 12px 16px;
            border-radius: 20px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .alert-danger{
            background: rgba(255,107,107,0.1);
            border: 1px solid #ff6b6b;
            color: #ff6b6b;
        }
        .alert-success{
            background: rgba(46,204,113,0.1);
            border: 1px solid #2ecc71;
            color: #2ecc71;
        }
        .link{
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }
        .link a{
            color: #ff6b6b;
            text-decoration: none;
            font-weight: 500;
        }
        .link a:hover{text-decoration:underline}
        .optional{
            color: #aaa;
            font-size: 12px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
<div class="card">
    <h2>🐻 Bear<span>Gram</span></h2>
    <h2 style="font-size:22px; margin-bottom:20px">📝 Регистрация</h2>
    
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    
    <form method="POST">
        <div class="form-group">
            <input type="text" name="username" placeholder="🐻 Имя пользователя" required>
        </div>
        <div class="form-group">
            <input type="text" name="username_link" placeholder="@username (необязательно)">
            <small>Можно добавить позже в настройках профиля</small>
        </div>
        <div class="form-group">
            <input type="password" name="password" placeholder="🔒 Пароль" required>
        </div>
        <div class="form-group">
            <input type="password" name="confirm_password" placeholder="🔒 Подтвердите пароль" required>
        </div>
        <button type="submit">🐾 Зарегистрироваться</button>
    </form>
    
    <div class="link">
        Уже есть аккаунт? <a href="/login">Войти 🐻</a>
    </div>
</div>
</body>
</html>
