<!DOCTYPE html>
<html lang="ru">
<head>
    <title>🔄 Обменник | BearGram</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
        body{
            background:linear-gradient(135deg, #1a1a2e, #16213e);
            min-height:100vh;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            padding:20px;
            margin:0;
        }
        .card{
            background:rgba(255,255,255,0.1);
            border-radius:30px;
            padding:30px;
            max-width:400px;
            width:100%;
            color:white;
            text-align:center;
            box-shadow:0 15px 35px rgba(0,0,0,0.4);
        }
        .card h2{font-size:26px;color:#ffd700;margin-bottom:15px}
        .card p{color:#aaa;font-size:14px;line-height:1.6;margin-bottom:10px}
        .notice{
            background:rgba(255,107,107,0.15);
            border:1px solid rgba(255,107,107,0.4);
            border-radius:12px;
            padding:12px;
            margin:15px 0;
            font-size:12px;
            color:#ff6b6b;
        }
        .btn{
            display:block;
            width:100%;
            padding:16px;
            border-radius:15px;
            font-weight:bold;
            font-size:18px;
            text-decoration:none;
            margin:12px 0;
            transition:transform 0.2s;
            text-align:center;
        }
        .btn:active{transform:scale(0.96)}
        .btn-primary{
            background:#ffd700;
            color:#000;
            box-shadow:0 8px 20px rgba(255,215,0,0.3);
        }
        .back-link{
            margin-top:20px;
            color:#888;
            text-decoration:none;
            font-size:14px;
            font-weight:bold;
        }

        /* Скрываем баннеры Google Translate */
        .goog-te-banner-frame, .goog-te-gadget, .goog-te-gadget-simple, 
        #google_translate_element, .goog-te-balloon-frame, .goog-tooltip,
        .goog-te-spinner-pos, iframe.goog-te-banner-frame, .skiptranslate {
            display: none !important;
            visibility: hidden !important;
            height: 0 !important;
            width: 0 !important;
            position: absolute !important;
            top: -9999px !important;
        }
        body { top: 0 !important; }
        .goog-text-highlight { background-color: transparent !important; box-shadow: none !important; }
    </style>
</head>
<body>
<!-- Google Translate (скрытый) -->
<script>
function googleTranslateElementInit() {
    new google.translate.TranslateElement({
        pageLanguage: 'ru',
        includedLanguages: 'en,ru,es,de,fr,zh-CN,ar,pt,ja,ko,tr,it,pl,uk,hi',
        layout: google.translate.TranslateElement.InlineLayout.HORIZONTAL,
        autoDisplay: false
    }, 'google_translate_element');
}
</script>
<script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
<div id="google_translate_element" style="display:none;"></div>

<script>
// Применяем сохранённый язык
(function() {
    var lang = localStorage.getItem('selectedLanguage');
    if (lang && lang !== 'ru') {
        var check = setInterval(function() {
            var select = document.querySelector('.goog-te-combo');
            if (select) {
                select.value = lang;
                select.dispatchEvent(new Event('change'));
                clearInterval(check);
            }
        }, 500);
    }
})();
</script>

<div class="card">
    <h2>🔄 Обменник BearGram</h2>
    <p>Обменивайте криптовалюту мгновенно и безопасно. Поддерживаются сотни пар.</p>
    
    <div class="notice">
        ⚠️ Для пользователей из России: обменник может быть недоступен без VPN. Включите VPN перед использованием.
    </div>

    <a href="https://changenow.io/?link_id=021079c6f6061a" target="_blank" class="btn btn-primary">
        🔄 Открыть обменник
    </a>
    <a href="/chat" class="back-link">← Вернуться в чат</a>
</div>

<script src="/static/lang.js"></script>
</body>
</html>
