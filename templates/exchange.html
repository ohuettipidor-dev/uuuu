<!DOCTYPE html>
<html>
<head>
    <title>🔄 Обменник | BearGram</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
        body{
            background:linear-gradient(135deg, #1a1a2e, #16213e);
            min-height:100vh;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            padding:20px;
            margin:0;
        }
        .card{
            background:rgba(255,255,255,0.1);
            border-radius:30px;
            padding:30px;
            max-width:400px;
            width:100%;
            color:white;
            text-align:center;
            box-shadow:0 15px 35px rgba(0,0,0,0.4);
        }
        .card h2{font-size:26px;color:#ffd700;margin-bottom:15px}
        .card p{color:#aaa;font-size:14px;line-height:1.6;margin-bottom:25px}
        
        .btn{
            display:block;
            width:100%;
            padding:16px;
            border-radius:15px;
            font-weight:bold;
            font-size:18px;
            text-decoration:none;
            margin:12px 0;
            transition:transform 0.2s;
            text-align:center;
        }
        .btn:active{transform:scale(0.96)}
        
        .btn-primary{
            background:#ffd700;
            color:#000;
            box-shadow:0 8px 20px rgba(255,215,0,0.3);
        }
        .btn-secondary{
            background:rgba(255,255,255,0.1);
            color:#fff;
            border:1px solid rgba(255,255,255,0.2);
        }
        
        .back-link{
            margin-top:20px;
            color:#888;
            text-decoration:none;
            font-size:14px;
            font-weight:bold;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>🔄 Обменник BearGram</h2>
        <p>Обменивайте криптовалюту мгновенно и безопасно. Поддерживаются сотни пар, включая RUB → TON.</p>
        
        <!-- Главная кнопка: прямой переход на полный обменник с нашим партнёрским ID -->
        <a href="https://changenow.io/?link_id=021079c6f6061a" target="_blank" rel="noopener" class="btn btn-primary">
            🔄 Открыть обменник
        </a>
        
        <a href="/chat" class="back-link">← Вернуться в чат</a>
    </div>
</body>
</html>
