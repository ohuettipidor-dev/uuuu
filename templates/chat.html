<!DOCTYPE html>
<html>
<head>
    <title>Чат</title>
    <meta http-equiv="refresh" content="3">
</head>
<body>
    <h2>Привет, {{ username }}!</h2>
    <a href="/logout">Выйти</a>
    <div style="border:1px solid #ccc; height:300px; overflow:auto; margin:20px 0; padding:10px;">
        {% for msg in messages %}
            <p><strong>{{ msg.user.username }}:</strong> {{ msg.content }} <small>({{ msg.timestamp.strftime('%H:%M') }})</small></p>
        {% endfor %}
    </div>
    <form method="POST" action="/send">
        <input type="text" name="content" placeholder="Сообщение..." style="width:70%">
        <button type="submit">Отправить</button>
    </form>
</body>
</html>
