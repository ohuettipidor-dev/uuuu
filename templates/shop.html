<!DOCTYPE html>
<html>
<head>
    <title>🛍️ Магазин | BearGram</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
        body{background:linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fbc2eb 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        .card{background:rgba(255,255,255,0.95);border-radius:30px;padding:25px;max-width:400px;width:100%;box-shadow:0 15px 35px rgba(0,0,0,0.1)}
        h2{color:#333;text-align:center;margin-bottom:20px}
        .section{margin-bottom:25px}
        .section-title{font-size:18px;color:#ff6b6b;margin-bottom:12px;border-bottom:2px solid #ff6b6b;padding-bottom:5px}
        .item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #f0f0f0}
        .item:last-child{border-bottom:none}
        .item-info{flex:1}
        .item-name{font-weight:600;color:#333}
        .item-desc{font-size:12px;color:#888;margin-top:2px}
        .item-price{font-weight:bold;color:#ff6b6b;margin-right:10px}
        button, .btn{background:linear-gradient(135deg,#ff6b6b,#ff8e8e);color:white;border:none;padding:8px 16px;border-radius:20px;cursor:pointer;font-weight:bold;font-size:13px}
        button:hover{opacity:0.9}
        .back-link{text-align:center;margin-top:20px}
        .back-link a{color:#ff6b6b;text-decoration:none}
        
        /* скрываем баннеры Google Translate */
        .goog-te-banner-frame, .goog-te-gadget, .goog-te-gadget-simple, 
        #google_translate_element, .goog-te-balloon-frame, .goog-tooltip,
        .goog-te-spinner-pos, iframe.goog-te-banner-frame, .skiptranslate {
            display: none !important;
            visibility: hidden !important;
            height: 0 !important;
            width: 0 !important;
            position: absolute !important;
            top: -9999px !important;
        }
        body { top: 0 !important; }
        .goog-text-highlight { background-color: transparent !important; box-shadow: none !important; }
    </style>
</head>
<body>
<!-- Google Translate (скрытый) -->
<script>
function googleTranslateElementInit() {
    new google.translate.TranslateElement({
        pageLanguage: 'ru',
        includedLanguages: 'en,ru,es,de,fr,zh-CN,ar,pt,ja,ko,tr,it,pl,uk,hi',
        layout: google.translate.TranslateElement.InlineLayout.HORIZONTAL,
        autoDisplay: false
    }, 'google_translate_element');
}
</script>
<script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
<div id="google_translate_element" style="display:none;"></div>

<script>
(function() {
    var lang = localStorage.getItem('selectedLanguage');
    if (lang && lang !== 'ru') {
        var check = setInterval(function() {
            var select = document.querySelector('.goog-te-combo');
            if (select) {
                select.value = lang;
                select.dispatchEvent(new Event('change'));
                clearInterval(check);
            }
        }, 500);
    }
})();
</script>

<div class="card">
    <h2>🛍️ Магазин</h2>
    
    <div class="section">
        <div class="section-title">💎 Кристалайзеры</div>
        <div class="item">
            <div class="item-info">
                <div class="item-name">100 💎</div>
                <div class="item-desc">Стартовый набор</div>
            </div>
            <span class="item-price">100 ₽</span>
            <button onclick="buyCoins(100)">Купить</button>
        </div>
        <div class="item">
            <div class="item-info">
                <div class="item-name">500 💎</div>
                <div class="item-desc">Популярный выбор</div>
            </div>
            <span class="item-price">450 ₽</span>
            <button onclick="buyCoins(500)">Купить</button>
        </div>
        <div class="item">
            <div class="item-info">
                <div class="item-name">1000 💎</div>
                <div class="item-desc">Больше, выгоднее</div>
            </div>
            <span class="item-price">800 ₽</span>
            <button onclick="buyCoins(1000)">Купить</button>
        </div>
    </div>

    <div class="section">
        <div class="section-title">👑 Premium</div>
        <div class="item">
            <div class="item-info">
                <div class="item-name">Premium на месяц</div>
                <div class="item-desc">Расширенные возможности</div>
            </div>
            <span class="item-price">300 💎</span>
            <button onclick="buyPremium()">Активировать</button>
        </div>
    </div>

    <div class="back-link">
        <a href="/chat">← Вернуться в чат</a>
    </div>
</div>

<script>
function buyCoins(amount) {
    alert('Функция оплаты в разработке. Свяжитесь с поддержкой.');
}
function buyPremium() {
    alert('Premium будет доступен в ближайшее время.');
}
</script>
</body>
</html>
