{% extends "base.html" %}
{% block content %}
<div class="stickers-container">
    <h2>📦 Стикерпаки</h2>
    
    <div class="my-packs">
        <h3>📱 Мои стикерпаки</h3>
        <div class="packs-grid">
            {% for pack in my_packs %}
            <div class="pack-card">
                <img src="{{ pack.preview }}" class="pack-preview">
                <h4>{{ pack.title }}</h4>
                <button onclick="usePack({{ pack.id }})">Использовать</button>
            </div>
            {% endfor %}
        </div>
    </div>
</div>

<script>
function usePack(packId) {
    fetch('/stickers/purchase/' + packId, {method: 'POST'})
        .then(() => location.reload());
}
</script>
{% endblock %}
