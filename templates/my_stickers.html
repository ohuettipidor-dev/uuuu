{% extends "base.html" %}
{% block content %}
<div class="my-stickers">
    <h2>🎨 Мои стикеры</h2>
    {% for pack in packs %}
    <div class="sticker-pack">
        <h3>{{ pack.name }}</h3>
        <div class="stickers-grid">
            {% for sticker in pack.stickers %}
            <div class="sticker-item" onclick="sendSticker({{ sticker.id }})">
                <img src="{{ sticker.file_path }}" style="width:100px">
                <span>{{ sticker.emoji }}</span>
            </div>
            {% endfor %}
        </div>
    </div>
    {% endfor %}
</div>

<script>
function sendSticker(stickerId) {
    const receiverId = prompt('Введите ID получателя:');
    if(receiverId) {
        fetch('/stickers/send/' + stickerId, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({receiver_id: receiverId, chat_type: 'private'})
        }).then(() => alert('Стикер отправлен!'));
    }
}
</script>
{% endblock %}
