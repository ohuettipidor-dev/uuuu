<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🍯 Медовый Ниндзя | #GRRR</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            font-family: system-ui, -apple-system, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            overflow: hidden;
            touch-action: none;
            height: 100vh;
            width: 100vw;
        }
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #grrrDisplay {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #ffd700;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 700;
            z-index: 10;
            box-shadow: 0 4px 15px rgba(255,215,0,0.3);
            border: 1px solid rgba(255,215,0,0.4);
        }
        #scoreDisplay {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 20px;
            font-weight: bold;
            z-index: 10;
        }
        .slice-effect {
            position: absolute;
            pointer-events: none;
            z-index: 5;
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
            animation: floatUp 0.8s ease-out forwards;
            text-shadow: 0 0 10px rgba(255,215,0,0.8);
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-60px); }
        }
    </style>
</head>
<body>
    <div id="scoreDisplay">🔪 <span id="scoreValue">0</span></div>
    <div id="grrrDisplay">🐻 <span id="grrrBalance">0.00</span></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        // ========== ОСНОВНЫЕ ПЕРЕМЕННЫЕ ==========
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('scoreValue');
        const grrrBalanceEl = document.getElementById('grrrBalance');

        let fruits = [];
        let score = 0;
        let sliceScore = 0;          // очки за текущую серию резов
        const GRRR_THRESHOLD = 20;   // каждые 20 очков = 1 GRRR
        let gameActive = true;
        let lastSpawn = Date.now();
        const SPAWN_DELAY = 1000;    // мс между спавнами

        // ========== АДАПТИВНЫЙ РАЗМЕР ==========
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // ========== БАЛАНС GRRR (получение и обновление на экране) ==========
        async function updateDisplayBalance() {
            try {
                const resp = await fetch('/api/grrr_balance');
                const data = await resp.json();
                if (data.balance !== undefined) {
                    grrrBalanceEl.textContent = parseFloat(data.balance).toFixed(2);
                }
            } catch (e) {}
        }
        updateDisplayBalance();
        setInterval(updateDisplayBalance, 5000);

        // ========== ОТПРАВКА GRRR НА СЕРВЕР (РАБОЧАЯ) ==========
        async function addGRRR(amount) {
            try {
                const resp = await fetch('/api/sync_grrr', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'amount=' + amount,
                    credentials: 'same-origin'
                });
                if (!resp.ok) return false;
                const data = await resp.json();
                if (data.success) {
                    // обновляем счётчик на экране сразу
                    if (grrrBalanceEl && data.new_balance !== undefined) {
                        grrrBalanceEl.textContent = parseFloat(data.new_balance).toFixed(2);
                    }
                    return true;
                }
                return false;
            } catch (e) {
                return false;
            }
        }

        // ========== ГЕНЕРАЦИЯ ФРУКТОВ ==========
        function spawnFruit() {
            if (!gameActive) return;
            const types = [
                { color: '#ffaa00', emoji: '🍯', radius: 30, points: 10 },
                { color: '#ff5500', emoji: '🍊', radius: 26, points: 8 },
                { color: '#ff0000', emoji: '🍎', radius: 28, points: 12 },
                { color: '#ffff00', emoji: '🍋', radius: 25, points: 6 },
                { color: '#00cc66', emoji: '🍏', radius: 27, points: 9 }
            ];
            const type = types[Math.floor(Math.random() * types.length)];
            const x = Math.random() * (canvas.width - 80) + 40;
            const y = canvas.height + 50;
            const vx = (Math.random() - 0.5) * 6;
            const vy = -(Math.random() * 7 + 9);
            fruits.push({
                ...type,
                x, y, vx, vy,
                sliced: false,
                rotation: 0,
                rotSpeed: (Math.random() - 0.5) * 0.2
            });
        }

        // ========== ФИЗИКА ==========
        function update() {
            fruits = fruits.filter(f => {
                f.x += f.vx;
                f.y += f.vy;
                f.vy += 0.35;   // гравитация
                f.rotation += f.rotSpeed;
                return f.y < canvas.height + 120 && !f.sliced;
            });
        }

        // ========== ОТРИСОВКА ==========
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            fruits.forEach(f => {
                ctx.save();
                ctx.translate(f.x, f.y);
                ctx.rotate(f.rotation);

                // тень
                ctx.shadowColor = 'rgba(0,0,0,0.4)';
                ctx.shadowBlur = 10;

                // фрукт
                ctx.beginPath();
                ctx.arc(0, 0, f.radius, 0, Math.PI * 2);
                ctx.fillStyle = f.sliced ? '#ff6666' : f.color;
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();

                // эмодзи
                if (!f.sliced) {
                    ctx.shadowBlur = 0;
                    ctx.font = `${f.radius}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillStyle = 'white';
                    ctx.fillText(f.emoji, 0, 2);
                }

                ctx.restore();
            });
        }

        // Игровой цикл
        function gameLoop() {
            update();
            draw();
            // спавн по времени
            if (Date.now() - lastSpawn > SPAWN_DELAY) {
                if (Math.random() < 0.7) spawnFruit();
                lastSpawn = Date.now();
            }
            requestAnimationFrame(gameLoop);
        }
        gameLoop();

        // ========== ОБРАБОТКА КАСАНИЙ (СВАЙП) ==========
        let touchTrail = [];

        function getPos(e) {
            const t = e.touches[0];
            return { x: t.clientX, y: t.clientY };
        }

        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            touchTrail = [getPos(e)];
        }, { passive: false });

        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            const pos = getPos(e);
            touchTrail.push(pos);
            if (touchTrail.length < 2) return;

            const p1 = touchTrail[touchTrail.length - 2];
            const p2 = pos;

            // Проверка пересечения с каждым фруктом
            fruits.forEach(f => {
                if (f.sliced) return;
                const dx = p2.x - p1.x;
                const dy = p2.y - p1.y;
                const fx = f.x - p1.x;
                const fy = f.y - p1.y;
                const dot = fx * dx + fy * dy;
                const lenSq = dx * dx + dy * dy;
                const t = lenSq === 0 ? 0 : Math.max(0, Math.min(1, dot / lenSq));
                const closestX = p1.x + t * dx;
                const closestY = p1.y + t * dy;
                const dist = Math.hypot(f.x - closestX, f.y - closestY);
                if (dist <= f.radius) {
                    f.sliced = true;
                    sliceScore += f.points;
                    score += f.points;
                    scoreEl.textContent = score;

                    // Эффект "+N" над фруктом
                    showSliceEffect(f.x, f.y, f.points);

                    // Начисление GRRR
                    if (sliceScore >= GRRR_THRESHOLD) {
                        const earned = Math.floor(sliceScore / GRRR_THRESHOLD);
                        addGRRR(earned);
                        sliceScore = sliceScore % GRRR_THRESHOLD;
                    }
                }
            });
        }, { passive: false });

        canvas.addEventListener('touchend', e => {
            e.preventDefault();
            touchTrail = [];
        });

        // Эффект всплывающих очков
        function showSliceEffect(x, y, pts) {
            const el = document.createElement('div');
            el.className = 'slice-effect';
            el.textContent = '+' + pts;
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 800);
        }

        // Блокировка прокрутки страницы
        document.body.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
    </script>
</body>
</html>
