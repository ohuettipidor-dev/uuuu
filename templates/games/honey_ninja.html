<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🍯 Медовый Ниндзя | #GRRR</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            font-family: system-ui;
        }
        body {
            background: #0a0a0a;
            overflow: hidden;
            touch-action: none;
            height: 100vh;
            width: 100vw;
        }
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #grrrDisplay {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.6);
            color: gold;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 18px;
            font-weight: bold;
            z-index: 10;
        }
        /* Панель отладки – будет показывать статус синхронизации */
        #syncDebug {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.85);
            color: #fff;
            font-size: 14px;
            padding: 6px;
            text-align: center;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <div id="grrrDisplay">🐻 <span id="grrrBalance">0.00</span></div>
    <canvas id="gameCanvas"></canvas>
    <div id="syncDebug">⏳ Ожидание нарезки...</div>

    <script>
        // ========== ЭЛЕМЕНТЫ ==========
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const grrrBalanceEl = document.getElementById('grrrBalance');
        const syncDebugEl = document.getElementById('syncDebug');

        // ========== ПОЛУЧЕНИЕ БАЛАНСА ==========
        async function updateDisplayBalance() {
            try {
                const resp = await fetch('/api/grrr_balance');
                const data = await resp.json();
                if (data.balance !== undefined) {
                    grrrBalanceEl.textContent = parseFloat(data.balance).toFixed(2);
                }
            } catch (e) {
                // не страшно
            }
        }
        updateDisplayBalance();
        setInterval(updateDisplayBalance, 5000);

        // ========== СИНХРОНИЗАЦИЯ GRRR ==========
        async function addGRRR(amount) {
            syncDebugEl.textContent = '⏳ Сохраняю +' + amount + ' GRRR...';
            try {
                const resp = await fetch('/api/sync_grrr', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'amount=' + amount,
                    credentials: 'same-origin'
                });
                if (!resp.ok) {
                    syncDebugEl.textContent = '🚫 Ошибка HTTP: ' + resp.status;
                    return false;
                }
                const data = await resp.json();
                if (data.success) {
                    syncDebugEl.textContent = '✅ +' + amount + ' GRRR сохранено! Баланс: ' + data.new_balance;
                    // обновим верхний счётчик
                    if (grrrBalanceEl && data.new_balance !== undefined) {
                        grrrBalanceEl.textContent = parseFloat(data.new_balance).toFixed(2);
                    }
                    return true;
                } else {
                    syncDebugEl.textContent = '❌ Сервер ответил success=false';
                    return false;
                }
            } catch (e) {
                syncDebugEl.textContent = '🚫 Ошибка сети/JS: ' + e.message;
                return false;
            }
        }

        // ========== ИГРА (упрощённая механика) ==========
        // Здесь вставлена базовая логика "фруктового ниндзя".
        // Если твоя версия сложнее, встрой вызов addGRRR() в своё место начисления очков.
        let fruits = [];
        let score = 0;
        let currentSliceScore = 0;
        let gameActive = true;

        // Адаптивный размер
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Фрукт
        function spawnFruit() {
            if (!gameActive) return;
            const x = Math.random() * canvas.width;
            const y = canvas.height + 40;
            const vx = (Math.random() - 0.5) * 8;
            const vy = -(Math.random() * 8 + 10);
            fruits.push({ x, y, vx, vy, radius: 25 + Math.random() * 20, sliced: false });
        }

        // Обновление
        function update() {
            fruits = fruits.filter(f => {
                f.x += f.vx;
                f.y += f.vy;
                f.vy += 0.3; // гравитация
                return f.y < canvas.height + 100 && !f.sliced;
            });
        }

        // Отрисовка
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            fruits.forEach(f => {
                ctx.beginPath();
                ctx.arc(f.x, f.y, f.radius, 0, Math.PI * 2);
                ctx.fillStyle = f.sliced ? '#ff6666' : '#ffaa00';
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();
            });
        }

        // Игровой цикл
        setInterval(() => {
            update();
            draw();
        }, 30);

        // Спавн фруктов
        setInterval(() => {
            if (Math.random() < 0.6) spawnFruit();
        }, 1200);

        // Обработка касания (свайпа)
        let touchPath = [];
        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            touchPath = [];
            const t = e.touches[0];
            touchPath.push({ x: t.clientX, y: t.clientY });
        });
        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            const t = e.touches[0];
            touchPath.push({ x: t.clientX, y: t.clientY });

            // Проверяем пересечение линии с фруктами
            if (touchPath.length >= 2) {
                const p1 = touchPath[touchPath.length - 2];
                const p2 = touchPath[touchPath.length - 1];
                fruits.forEach(f => {
                    if (f.sliced) return;
                    // Простая проверка попадания линии в окружность
                    const dx = p2.x - p1.x;
                    const dy = p2.y - p1.y;
                    const fx = f.x - p1.x;
                    const fy = f.y - p1.y;
                    const dot = fx * dx + fy * dy;
                    const lenSq = dx*dx + dy*dy;
                    const t = lenSq === 0 ? 0 : Math.max(0, Math.min(1, dot / lenSq));
                    const closestX = p1.x + t * dx;
                    const closestY = p1.y + t * dy;
                    const dist = Math.hypot(f.x - closestX, f.y - closestY);
                    if (dist <= f.radius) {
                        f.sliced = true;
                        currentSliceScore += 10; // 10 очков за разрез
                        // Начисление GRRR каждые 20 очков (как в оригинале)
                        if (currentSliceScore >= 20) {
                            const earned = Math.floor(currentSliceScore / 20);
                            addGRRR(earned);
                            currentSliceScore = currentSliceScore % 20;
                        }
                        score += 10;
                    }
                });
            }
        });
        canvas.addEventListener('touchend', e => {
            e.preventDefault();
            touchPath = [];
        });

        // Защита от скролла
        document.body.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
    </script>
</body>
</html>
