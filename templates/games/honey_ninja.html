<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🍯 Медовый Ниндзя | #GRRR</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
        body{
            font-family:'Segoe UI',system-ui,sans-serif;
            background:radial-gradient(circle at 20% 50%, #2d1b3a, #0f0c1f);
            min-height:100vh;display:flex;align-items:center;justify-content:center;
            padding:10px;color:#fff;touch-action:manipulation;overflow:hidden;
        }
        .game-wrapper{
            width:100%;max-width:420px;background:rgba(255,255,255,0.05);
            backdrop-filter:blur(15px);border-radius:40px;padding:15px 12px 20px;
            box-shadow:0 20px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
            display:flex;flex-direction:column;align-items:center;gap:12px;
        }
        .top-bar{display:flex;justify-content:space-between;width:100%;align-items:center;}
        .logo{font-weight:800;font-size:1.3rem;color:#f9ca24;text-shadow:0 0 10px rgba(249,202,36,0.5);}
        .balance-badge{background:rgba(0,0,0,0.5);border-radius:30px;padding:6px 14px;border:1px solid rgba(255,215,0,0.3);display:flex;align-items:center;gap:6px;}
        .balance-badge span{font-weight:bold;color:#ffeaa7;}
        .stats{display:flex;justify-content:space-between;width:100%;font-size:14px;flex-wrap:wrap;}
        .stats .label{color:#aaa;}.stats .value{color:#f9ca24;font-weight:bold;margin-left:4px;}
        .canvas-box{position:relative;width:100%;aspect-ratio:1/1.2;max-height:450px;border-radius:30px;overflow:hidden;box-shadow:inset 0 0 30px rgba(0,0,0,0.5);border:2px solid rgba(255,215,0,0.2);}
        canvas{display:block;width:100%;height:100%;background:linear-gradient(180deg, #1e1530 0%, #2a1f3a 100%);}
        .btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
        .btn{
            background:linear-gradient(135deg,#f9ca24,#f0932b);border:none;color:#1a1a2e;
            font-weight:bold;padding:10px 20px;border-radius:40px;cursor:pointer;
            box-shadow:0 8px 16px rgba(240,147,43,0.5);transition:0.2s;font-size:14px;
        }
        .btn:active{transform:scale(0.95);}
        .btn-outline{
            background:transparent;border:1px solid #f9ca24;color:#f9ca24;
            box-shadow:none;
        }
        .debug-line{
            width:100%;text-align:center;font-size:11px;color:#aaa;
            margin-top:5px;opacity:0.8;
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="top-bar">
        <a href="/games" style="color:#f9ca24;text-decoration:none;font-size:18px;margin-right:10px;">← Игры</a>
        <span class="logo">🍯 Медовый Ниндзя</span>
        <div class="balance-badge">
            <span>🐻</span> <span id="grrrBalance">0.00</span>
        </div>
    </div>
    <div class="stats">
        <span class="label">🎯 Счёт <span class="value" id="scoreDisplay">0</span></span>
        <span class="label">🏆 Лучший <span class="value" id="bestDisplay">0</span></span>
        <span class="label">❤️ <span id="livesDisplay">3</span></span>
        <span class="label">⚡Ур. <span class="value" id="levelDisplay">1</span></span>
        <span class="label">🚀<span class="value" id="speedDisplay">1×</span></span>
    </div>
    <div class="canvas-box">
        <canvas id="gameCanvas"></canvas>
    </div>
    <div class="btns">
        <button class="btn" id="newGameBtn">🔄 Новая игра</button>
        <button class="btn btn-outline" id="dailyBonusBtn">🎁 Бонус</button>
    </div>
    <div class="debug-line" id="syncDebug"></div>
</div>

<script>
// ========== РАБОЧАЯ СВЯЗЬ С СЕРВЕРОМ ==========
const grrrBalanceEl = document.getElementById('grrrBalance');
const syncDebugEl = document.getElementById('syncDebug');

async function updateDisplayBalance() {
    try {
        const resp = await fetch('/api/grrr_balance');
        const data = await resp.json();
        if (data.balance !== undefined) {
            grrrBalanceEl.textContent = parseFloat(data.balance).toFixed(2);
        }
    } catch (e) {}
}
updateDisplayBalance();
setInterval(updateDisplayBalance, 5000);

async function addGRRR(amount) {
    syncDebugEl.textContent = '⏳ +' + amount + ' GRRR...';
    try {
        const resp = await fetch('/api/sync_grrr', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: 'amount=' + amount,
            credentials: 'same-origin'
        });
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const data = await resp.json();
        if (data.success) {
            grrrBalanceEl.textContent = parseFloat(data.new_balance).toFixed(2);
            syncDebugEl.textContent = '✅ +' + amount + ' GRRR';
            return true;
        } else {
            syncDebugEl.textContent = '❌ сервер отказал';
            return false;
        }
    } catch (e) {
        syncDebugEl.textContent = '🚫 ' + e.message;
        return false;
    }
}

// ========== ИГРОВАЯ МЕХАНИКА С УСКОРЕНИЕМ ==========
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let W, H;
function resizeCanvas() {
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;
    W = canvas.width;
    H = canvas.height;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// Состояние
let fruits = [];
let bombs = [];
let particles = [];
let score = 0;
let best = parseInt(localStorage.getItem('honey_best') || '0');
let lives = 3;
let gameOver = false;
let mouseX = W/2, mouseY = H/2;
let trail = [];
let isSlicing = false;
let lastSpawn = Date.now();

let level = 1;
let speedMultiplier = 1;
const SCORE_PER_LEVEL = 30;
const MAX_SPEED = 5;

let spawnFruitInterval = null;
let spawnBombInterval = null;

const FRUIT_TYPES = [
    { emoji:'🍉', radius:24, points:8, color:'#4cd964' },
    { emoji:'🍊', radius:22, points:4, color:'#f0932b' },
    { emoji:'🍎', radius:21, points:5, color:'#e74c3c' },
    { emoji:'🍓', radius:18, points:3, color:'#ff4444' },
    { emoji:'🍇', radius:19, points:2, color:'#a29bfe' },
    { emoji:'🍒', radius:17, points:3, color:'#ff6b6b' },
    { emoji:'🍯', radius:23, points:6, color:'#f9ca24' }
];
const BOMB_EMOJI = '💣';
const BOMB_RADIUS = 20;

// ========== УСЛОЖНЕНИЕ: МЕНЬШЕ РАЗЛЁТ, БОЛЬШЕ БОМБ ==========
function updateLevelAndSpeed() {
    const newLevel = Math.floor(score / SCORE_PER_LEVEL) + 1;
    if (newLevel !== level) {
        level = newLevel;
        speedMultiplier = 1 + (level - 1) * 0.4;
        if (speedMultiplier > MAX_SPEED) speedMultiplier = MAX_SPEED;
        document.getElementById('levelDisplay').textContent = level;
        document.getElementById('speedDisplay').textContent = speedMultiplier.toFixed(1) + '×';
        restartSpawnTimers();
    }
}

function restartSpawnTimers() {
    clearInterval(spawnFruitInterval);
    clearInterval(spawnBombInterval);
    const fruitDelay = Math.max(400, 1000 - (level - 1) * 80);
    spawnFruitInterval = setInterval(() => {
        if (!gameOver && lives > 0 && Math.random() < 0.7) spawnFruit();
    }, fruitDelay);
    const bombDelay = Math.max(450, 1400 - (level - 1) * 100);
    spawnBombInterval = setInterval(() => {
        if (!gameOver && lives > 0 && Math.random() < 0.4) spawnBomb();
    }, bombDelay);
}

function spawnFruit() {
    if (gameOver || lives <= 0) return;
    const type = FRUIT_TYPES[Math.floor(Math.random() * FRUIT_TYPES.length)];
    const baseVX = (Math.random() - 0.5) * 2.5;
    const baseVY = -(Math.random() * 8 + 10);
    fruits.push({
        ...type,
        x: Math.random() * (W - 60) + 30,
        y: H + 40,
        vx: baseVX * speedMultiplier,
        vy: baseVY * speedMultiplier,
        radius: type.radius,
        rotation: 0,
        rotSpeed: (Math.random() - 0.5) * 0.1 * speedMultiplier,
        sliced: false
    });
}

function spawnBomb() {
    if (gameOver || lives <= 0) return;
    const baseVX = (Math.random() - 0.5) * 2.2;
    const baseVY = -(Math.random() * 7 + 8);
    bombs.push({
        x: Math.random() * (W - 60) + 30,
        y: H + 40,
        vx: baseVX * speedMultiplier,
        vy: baseVY * speedMultiplier,
        radius: BOMB_RADIUS,
        rotation: 0,
        rotSpeed: (Math.random() - 0.5) * 0.08 * speedMultiplier
    });
}

function keepInBounds(obj) {
    const margin = 10;
    if (obj.x < margin) { obj.x = margin; obj.vx = Math.abs(obj.vx) * 0.7; }
    if (obj.x > W - margin) { obj.x = W - margin; obj.vx = -Math.abs(obj.vx) * 0.7; }
}

function updateGame() {
    if (gameOver || lives <= 0) return;
    fruits = fruits.filter(f => {
        f.x += f.vx;
        f.y += f.vy;
        f.vy += 0.3 * speedMultiplier;
        f.rotation += f.rotSpeed;
        keepInBounds(f);
        return (f.y < H + 100 && !f.sliced);
    });
    bombs = bombs.filter(b => {
        b.x += b.vx;
        b.y += b.vy;
        b.vy += 0.3 * speedMultiplier;
        b.rotation += b.rotSpeed;
        keepInBounds(b);
        return (b.y < H + 100);
    });
    particles = particles.filter(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.2;
        p.life -= 0.02;
        return p.life > 0;
    });
}

function draw() {
    ctx.clearRect(0, 0, W, H);
    if (trail.length > 1) {
        ctx.beginPath();
        ctx.moveTo(trail[0].x, trail[0].y);
        for (let i = 1; i < trail.length; i++) {
            ctx.lineTo(trail[i].x, trail[i].y);
        }
        ctx.strokeStyle = 'rgba(255,255,255,0.8)';
        ctx.lineWidth = 4;
        ctx.lineCap = 'round';
        ctx.shadowColor = 'white';
        ctx.shadowBlur = 10;
        ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.shadowColor = 'transparent';
    }
    fruits.forEach(f => {
        ctx.save();
        ctx.translate(f.x, f.y);
        ctx.rotate(f.rotation);
        ctx.font = `${f.radius*2}px "Segoe UI Emoji", "Apple Color Emoji", sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(f.emoji, 0, 0);
        ctx.restore();
    });
    bombs.forEach(b => {
        ctx.save();
        ctx.translate(b.x, b.y);
        ctx.rotate(b.rotation);
        ctx.font = `${b.radius*2}px "Segoe UI Emoji"`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(BOMB_EMOJI, 0, 0);
        ctx.restore();
    });
    particles.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
        ctx.fill();
    });
    ctx.globalAlpha = 1;
    if (gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(0,0,W,H);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 28px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Игра окончена', W/2, H/2-15);
        ctx.font = '18px sans-serif';
        ctx.fillText('Счёт: ' + score, W/2, H/2+25);
    }
}

function lineIntersectsCircle(x1,y1,x2,y2, cx,cy, r) {
    const dx = x2-x1, dy = y2-y1;
    const fx = cx-x1, fy = cy-y1;
    const dot = fx*dx + fy*dy;
    const lenSq = dx*dx+dy*dy;
    const t = lenSq===0 ? 0 : Math.max(0, Math.min(1, dot/lenSq));
    const closestX = x1 + t*dx;
    const closestY = y1 + t*dy;
    return Math.hypot(cx-closestX, cy-closestY) <= r;
}

function sliceCheck(x1,y1,x2,y2) {
    fruits.forEach(f => {
        if (f.sliced) return;
        if (lineIntersectsCircle(x1,y1,x2,y2, f.x,f.y, f.radius)) {
            f.sliced = true;
            score += f.points;
            updateScore();
            for (let i=0;i<12;i++) {
                particles.push({
                    x: f.x, y: f.y,
                    vx: (Math.random()-0.5)*8,
                    vy: (Math.random()-0.5)*8 - 3,
                    life: 1,
                    color: f.color,
                    size: 3+Math.random()*5
                });
            }
            let earned = Math.max(1, Math.floor(f.points/2));
            addGRRR(earned);
        }
    });
    bombs.forEach(b => {
        if (lineIntersectsCircle(x1,y1,x2,y2, b.x,b.y, b.radius)) {
            b.hit = true;
            lives--;
            updateLives();
            for (let i=0;i<20;i++) {
                particles.push({
                    x: b.x, y: b.y,
                    vx: (Math.random()-0.5)*15,
                    vy: (Math.random()-0.5)*15 - 5,
                    life: 1,
                    color: '#ff4444',
                    size: 4+Math.random()*7
                });
            }
            if (lives <= 0) endGame();
        }
    });
    bombs = bombs.filter(b => !b.hit);
}

function updateScore() {
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('bestDisplay').textContent = best;
    updateLevelAndSpeed();
}
function updateLives() {
    document.getElementById('livesDisplay').textContent = lives;
}
function endGame() {
    gameOver = true;
    clearInterval(spawnFruitInterval);
    clearInterval(spawnBombInterval);
    if (score > best) {
        best = score;
        localStorage.setItem('honey_best', best);
    }
    updateScore();
}

function gameLoop() {
    if (!gameOver && lives > 0) {
        updateGame();
    }
    draw();
    requestAnimationFrame(gameLoop);
}

function getCanvasPos(e) {
    const rect = canvas.getBoundingClientRect();
    return {
        x: e.touches[0].clientX - rect.left,
        y: e.touches[0].clientY - rect.top
    };
}

canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    if (gameOver) return;
    const p = getCanvasPos(e);
    mouseX = p.x; mouseY = p.y;
    trail = [p];
    isSlicing = true;
});
canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (!isSlicing || gameOver) return;
    const p = getCanvasPos(e);
    trail.push(p);
    if (trail.length > 20) trail.shift();
    if (trail.length >= 2) {
        const p1 = trail[trail.length-2];
        const p2 = trail[trail.length-1];
        sliceCheck(p1.x, p1.y, p2.x, p2.y);
    }
    mouseX = p.x; mouseY = p.y;
});
canvas.addEventListener('touchend', e => {
    e.preventDefault();
    isSlicing = false;
    trail = [];
});

document.getElementById('newGameBtn').addEventListener('click', () => {
    fruits = []; bombs = []; particles = []; score = 0; lives = 3; gameOver = false;
    level = 1; speedMultiplier = 1;
    document.getElementById('levelDisplay').textContent = level;
    document.getElementById('speedDisplay').textContent = '1×';
    trail = [];
    updateScore(); updateLives();
    restartSpawnTimers();
});
document.getElementById('dailyBonusBtn').addEventListener('click', () => {
    const today = new Date().toDateString();
    const last = localStorage.getItem('grrr_bonus_date');
    if (last === today) {
        syncDebugEl.textContent = '🎁 Бонус уже получен';
        return;
    }
    localStorage.setItem('grrr_bonus_date', today);
    addGRRR(10);
    syncDebugEl.textContent = '🎁 +10 GRRR';
});

updateScore();
updateLives();
restartSpawnTimers();
gameLoop();
</script>
