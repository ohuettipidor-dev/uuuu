<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🐻 Медовая ферма | #GRRR</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
        body{
            font-family:'Segoe UI',system-ui,sans-serif;
            background:radial-gradient(circle at 20% 50%, #2d1b3a, #0f0c1f);
            min-height:100vh;display:flex;align-items:center;justify-content:center;
            padding:10px;color:#fff;touch-action:manipulation;overflow:hidden;
        }
        .game-wrapper{
            width:100%;max-width:420px;background:rgba(255,255,255,0.05);
            backdrop-filter:blur(15px);border-radius:40px;padding:15px 12px 20px;
            box-shadow:0 20px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
            display:flex;flex-direction:column;align-items:center;gap:12px;
        }
        .top-bar{display:flex;justify-content:space-between;width:100%;align-items:center;}
        .logo{font-weight:800;font-size:1.3rem;color:#f9ca24;text-shadow:0 0 10px rgba(249,202,36,0.5);}
        .balance-badge{background:rgba(0,0,0,0.5);border-radius:30px;padding:6px 14px;border:1px solid rgba(255,215,0,0.3);display:flex;align-items:center;gap:6px;}
        .balance-badge span{font-weight:bold;color:#ffeaa7;}
        .hive-area{position:relative;width:100%;aspect-ratio:1/1;max-height:320px;display:flex;justify-content:center;align-items:center;margin:10px 0;}
        .clickable{
            font-size:100px;cursor:pointer;transition:transform 0.05s;
            filter:drop-shadow(0 0 20px rgba(255,215,0,0.5));
            position:relative;z-index:2;
        }
        .clickable:active{transform:scale(0.85);}
        .float-text{position:absolute;pointer-events:none;font-weight:bold;color:#ffeaa7;z-index:10;font-size:24px;animation:floatUp 0.8s ease-out forwards;text-shadow:0 0 10px gold;}
        @keyframes floatUp{0%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(-60px);}}
        .stats{display:flex;justify-content:space-between;width:100%;font-size:14px;}
        .debug-line{width:100%;text-align:center;font-size:11px;color:#aaa;margin-top:5px;opacity:0.8;}
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="top-bar">
        <span class="logo">🐻 Медовая ферма</span>
        <div class="balance-badge">
            <span>🪙</span> <span id="grrrBalance">0.00</span>
        </div>
    </div>
    <div class="stats">
        <span class="label">⚡ +0.1 GRRR за клик</span>
    </div>
    <div class="hive-area" id="hiveArea">
        <div class="clickable" id="clickBtn">🍯</div>
    </div>
    <div class="debug-line" id="syncDebug"></div>
</div>

<script>
// ========== ТОЧНО ТАКАЯ ЖЕ СИНХРОНИЗАЦИЯ, КАК В HONEY-NINJA ==========
const grrrBalanceEl = document.getElementById('grrrBalance');
const syncDebugEl = document.getElementById('syncDebug');

async function updateDisplayBalance() {
    try {
        const resp = await fetch('/api/grrr_balance');
        const data = await resp.json();
        if (data.balance !== undefined) {
            grrrBalanceEl.textContent = parseFloat(data.balance).toFixed(2);
        }
    } catch (e) {}
}
updateDisplayBalance();
setInterval(updateDisplayBalance, 5000);

// Дневной лимит (как в оригинале)
const DAILY_KEY = 'grrr_daily';
const LIMIT = 100;
let daily = parseInt(localStorage.getItem(DAILY_KEY) || '0');
const today = new Date().toDateString();
if (localStorage.getItem('grrr_date') !== today) {
    daily = 0;
    localStorage.setItem(DAILY_KEY, '0');
    localStorage.setItem('grrr_date', today);
}
function saveDaily() { localStorage.setItem(DAILY_KEY, daily); }

async function addGRRR(amount) {
    if (daily >= LIMIT) {
        syncDebugEl.textContent = 'Лимит на сегодня исчерпан';
        return false;
    }
    let add = Math.min(amount, LIMIT - daily);
    daily += add;
    saveDaily();

    syncDebugEl.textContent = '⏳ +' + add.toFixed(2) + ' GRRR...';
    try {
        const resp = await fetch('/api/sync_grrr', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: 'amount=' + add,
            credentials: 'same-origin'
        });
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const data = await resp.json();
        if (data.success) {
            grrrBalanceEl.textContent = parseFloat(data.new_balance).toFixed(2);
            syncDebugEl.textContent = '✅ +' + add.toFixed(2) + ' GRRR';
            return true;
        } else {
            syncDebugEl.textContent = '❌ сервер отказал';
            return false;
        }
    } catch (e) {
        syncDebugEl.textContent = '🚫 ' + e.message;
        return false;
    }
}

// ========== КЛИК ==========
const clickBtn = document.getElementById('clickBtn');
const hiveArea = document.getElementById('hiveArea');

async function handleClick(e) {
    const earned = 0.1; // фиксированный заработок за клик
    await addGRRR(earned);

    // Всплывающий текст
    const floatEl = document.createElement('div');
    floatEl.className = 'float-text';
    floatEl.textContent = '+0.1 GRRR';
    const rect = hiveArea.getBoundingClientRect();
    floatEl.style.left = (e.clientX - rect.left) + 'px';
    floatEl.style.top = (e.clientY - rect.top) + 'px';
    hiveArea.appendChild(floatEl);
    setTimeout(() => floatEl.remove(), 800);

    clickBtn.style.transform = 'scale(0.9)';
    setTimeout(() => clickBtn.style.transform = '', 80);
}

clickBtn.addEventListener('click', (e) => { e.preventDefault(); handleClick(e); });
clickBtn.addEventListener('touchstart', (e) => { e.preventDefault(); handleClick(e.touches[0]); });
</script>
</body>
</html>
