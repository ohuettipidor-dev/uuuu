<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🐻 Кликер | Медовая ферма #GRRR</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
        body{
            font-family:'Segoe UI',system-ui,sans-serif;
            background:radial-gradient(circle at 20% 50%, #2d1b3a, #0f0c1f);
            min-height:100vh;display:flex;align-items:center;justify-content:center;
            padding:10px;color:#fff;touch-action:manipulation;overflow-y:auto;
        }
        .game-wrapper{
            width:100%;max-width:420px;background:rgba(255,255,255,0.05);
            backdrop-filter:blur(15px);border-radius:40px;padding:15px 12px 20px;
            box-shadow:0 20px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
            display:flex;flex-direction:column;align-items:center;gap:12px;
        }
        .top-bar{display:flex;justify-content:space-between;width:100%;align-items:center;}
        .logo{font-weight:800;font-size:1.3rem;color:#f9ca24;text-shadow:0 0 10px rgba(249,202,36,0.5);}
        .balance-badge{background:rgba(0,0,0,0.5);border-radius:30px;padding:6px 14px;border:1px solid rgba(255,215,0,0.3);display:flex;align-items:center;gap:6px;}
        .balance-badge span{font-weight:bold;color:#ffeaa7;}
        .stats{display:flex;justify-content:space-between;width:100%;font-size:14px;flex-wrap:wrap;}
        .stats .label{color:#aaa;}.stats .value{color:#f9ca24;font-weight:bold;margin-left:4px;}
        .hive-area{position:relative;width:100%;aspect-ratio:1/1;max-height:320px;display:flex;justify-content:center;align-items:center;margin:10px 0;}
        .clickable{
            font-size:100px;cursor:pointer;transition:transform 0.05s;
            filter:drop-shadow(0 0 20px rgba(255,215,0,0.5));
            position:relative;z-index:2;
        }
        .clickable:active{transform:scale(0.85);}
        .float-text{position:absolute;pointer-events:none;font-weight:bold;color:#ffeaa7;z-index:10;font-size:24px;animation:floatUp 0.8s ease-out forwards;text-shadow:0 0 10px gold;}
        @keyframes floatUp{0%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(-60px);}}
        .shop{width:100%;display:flex;flex-direction:column;gap:8px;margin-top:10px;}
        .shop-item{display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,0.08);border-radius:16px;padding:12px;border:1px solid rgba(255,255,255,0.05);}
        .shop-info{display:flex;flex-direction:column;gap:4px;}
        .shop-name{font-weight:bold;font-size:15px;}
        .shop-desc{font-size:11px;color:#aaa;}
        .shop-cost{color:#f9ca24;font-weight:bold;font-size:13px;}
        .shop-buy{background:linear-gradient(135deg,#f9ca24,#f0932b);border:none;color:#1a1a2e;font-weight:bold;padding:8px 16px;border-radius:20px;cursor:pointer;transition:0.2s;}
        .shop-buy:active{transform:scale(0.95);}
        .shop-buy:disabled{opacity:0.4;transform:none;background:gray;}
        .boost-section{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;width:100%;}
        .btn{background:linear-gradient(135deg,#f9ca24,#f0932b);border:none;color:#1a1a2e;font-weight:bold;padding:10px 20px;border-radius:40px;cursor:pointer;box-shadow:0 8px 16px rgba(240,147,43,0.5);transition:0.2s;font-size:14px;}
        .btn:active{transform:scale(0.95);}
        .btn-outline{background:transparent;border:1px solid #f9ca24;color:#f9ca24;box-shadow:none;}
        .debug-line{width:100%;text-align:center;font-size:11px;color:#aaa;margin-top:5px;opacity:0.8;}
        .boost-status{font-size:12px;color:#a29bfe;text-align:center;}
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="top-bar">
        <span class="logo">🐻 Медовая ферма</span>
        <div class="balance-badge">
            <span>🪙</span> <span id="grrrBalance">0.00</span>
        </div>
    </div>
    <div class="stats">
        <span class="label">🍯 Мёд <span class="value" id="honeyDisplay">0</span></span>
        <span class="label">⚡За клик <span class="value" id="clickPowerDisplay">1</span></span>
        <span class="label">🕒Авто <span class="value" id="autoDisplay">0/с</span></span>
    </div>
    <div class="hive-area" id="hiveArea">
        <div class="clickable" id="clickBtn">🍯</div>
    </div>

    <!-- Магазин улучшений за мёд -->
    <div class="shop">
        <div class="shop-item">
            <div class="shop-info">
                <div class="shop-name">🪓 Увеличить клик</div>
                <div class="shop-desc">+1 мёда за клик</div>
            </div>
            <div><span class="shop-cost" id="upgradeClickCost">10</span> 🍯</div>
            <button class="shop-buy" id="upgradeClickBtn">Купить</button>
        </div>
        <div class="shop-item">
            <div class="shop-info">
                <div class="shop-name">🐝 Пчела-работник</div>
                <div class="shop-desc">+1 мёда в секунду</div>
            </div>
            <div><span class="shop-cost" id="upgradeAutoCost">25</span> 🍯</div>
            <button class="shop-buy" id="upgradeAutoBtn">Купить</button>
        </div>
    </div>

    <!-- Бусты за кристаллайзеры 💎 -->
    <div class="boost-section">
        <button class="btn" onclick="activateBoost('x2', 15)">⚡×2 (15💎)</button>
        <button class="btn" onclick="activateBoost('x3', 30)">🔥×3 (30💎)</button>
        <button class="btn" onclick="activateBoost('x5', 50)">💎×5 (50💎)</button>
    </div>
    <div class="boost-status" id="boostStatus">Буст не активен</div>

    <!-- Ручной обмен мёда на GRRR -->
    <div class="boost-section" style="margin-top:5px;">
        <button class="btn btn-outline" id="convertBtn">💰 Обменять в GRRR</button>
    </div>
    <div class="debug-line" id="syncDebug"></div>
</div>

<script>
// ========== СИНХРОНИЗАЦИЯ GRRR (как в honey-ninja) ==========
const grrrBalanceEl = document.getElementById('grrrBalance');
const syncDebugEl = document.getElementById('syncDebug');

async function updateDisplayBalance() {
    try {
        const resp = await fetch('/api/grrr_balance');
        const data = await resp.json();
        if (data.balance !== undefined) {
            grrrBalanceEl.textContent = parseFloat(data.balance).toFixed(2);
        }
    } catch (e) {}
}
updateDisplayBalance();
setInterval(updateDisplayBalance, 5000);

// Отправка GRRR на сервер с дневным лимитом (как в оригинале)
const DAILY_KEY = 'grrr_daily';
const LIMIT = 100;
let daily = parseInt(localStorage.getItem(DAILY_KEY) || '0');
const today = new Date().toDateString();
if (localStorage.getItem('grrr_date') !== today) {
    daily = 0;
    localStorage.setItem(DAILY_KEY, '0');
    localStorage.setItem('grrr_date', today);
}
function saveDaily() { localStorage.setItem(DAILY_KEY, daily); }

async function addGRRR(amount) {
    if (daily >= LIMIT) {
        syncDebugEl.textContent = 'Дневной лимит GRRR исчерпан';
        return false;
    }
    let add = Math.min(amount, LIMIT - daily);
    daily += add;
    saveDaily();

    syncDebugEl.textContent = '⏳ +' + add + ' GRRR...';
    try {
        const resp = await fetch('/api/sync_grrr', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: 'amount=' + add,
            credentials: 'same-origin'
        });
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const data = await resp.json();
        if (data.success) {
            grrrBalanceEl.textContent = parseFloat(data.new_balance).toFixed(2);
            syncDebugEl.textContent = '✅ +' + add + ' GRRR';
            return true;
        } else {
            syncDebugEl.textContent = '❌ сервер отказал';
            return false;
        }
    } catch (e) {
        syncDebugEl.textContent = '🚫 ' + e.message;
        return false;
    }
}

// ========== БУСТЫ ЗА КРИСТАЛЛАЙЗЕРЫ (💎) ==========
let currentBoost = localStorage.getItem('game_boost') || null;
let boostEndTime = localStorage.getItem('game_boost_end') || null;

function updateBoostUI() {
    const now = Date.now();
    if (boostEndTime && now > parseInt(boostEndTime)) {
        currentBoost = null;
        boostEndTime = null;
        localStorage.removeItem('game_boost');
        localStorage.removeItem('game_boost_end');
    }
    const statusEl = document.getElementById('boostStatus');
    if (currentBoost) {
        const remaining = Math.max(0, Math.floor((parseInt(boostEndTime) - now) / 60000));
        statusEl.innerHTML = `⚡ Буст ${currentBoost} активен! Осталось: ${remaining} мин`;
        statusEl.style.color = '#a29bfe';
    } else {
        statusEl.innerHTML = 'Буст не активен';
        statusEl.style.color = '#aaa';
    }
    // Обновим множитель для отображения
    updateUI();
}

function activateBoost(type, cost) {
    if (currentBoost) {
        alert('Буст уже активен! Дождитесь окончания.');
        return;
    }
    if (!confirm(`Купить буст ⚡${type} за ${cost} 💎?`)) return;

    // Списываем кристаллайзеры через API
    fetch('/api/spend_coins', {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: 'amount=' + cost
    })
    .then(r => r.json())
    .then(data => {
        if (!data.success) {
            alert('Недостаточно 💎!');
            return;
        }
        currentBoost = type;
        boostEndTime = Date.now() + 30 * 60 * 1000; // 30 минут
        localStorage.setItem('game_boost', type);
        localStorage.setItem('game_boost_end', boostEndTime);
        updateBoostUI();
        syncDebugEl.textContent = 'Буст ' + type + ' активирован на 30 мин';
    })
    .catch(() => {
        alert('Ошибка при покупке буста');
    });
}

// Множитель буста
function getBoostMultiplier() {
    if (!currentBoost || !boostEndTime) return 1;
    if (Date.now() > parseInt(boostEndTime)) {
        currentBoost = null; boostEndTime = null;
        localStorage.removeItem('game_boost'); localStorage.removeItem('game_boost_end');
        return 1;
    }
    if (currentBoost === 'x2') return 2;
    if (currentBoost === 'x3') return 3;
    if (currentBoost === 'x5') return 5;
    return 1;
}

// ========== СОСТОЯНИЕ КЛИКЕРА ==========
let honey = 0;
let clickPower = 1;
let autoIncome = 0;
let upgradeClickLevel = 0;
let upgradeAutoLevel = 0;

function getUpgradeClickCost() { return Math.floor(10 * Math.pow(1.5, upgradeClickLevel)); }
function getUpgradeAutoCost() { return Math.floor(25 * Math.pow(1.7, upgradeAutoLevel)); }

const honeyDisplay = document.getElementById('honeyDisplay');
const clickPowerDisplay = document.getElementById('clickPowerDisplay');
const autoDisplay = document.getElementById('autoDisplay');
const upgradeClickCostEl = document.getElementById('upgradeClickCost');
const upgradeAutoCostEl = document.getElementById('upgradeAutoCost');
const upgradeClickBtn = document.getElementById('upgradeClickBtn');
const upgradeAutoBtn = document.getElementById('upgradeAutoBtn');
const convertBtn = document.getElementById('convertBtn');
const clickBtn = document.getElementById('clickBtn');
const hiveArea = document.getElementById('hiveArea');

function updateUI() {
    const mult = getBoostMultiplier();
    honeyDisplay.textContent = Math.floor(honey); // показываем целые
    clickPowerDisplay.textContent = clickPower * mult;
    autoDisplay.textContent = (autoIncome * mult).toFixed(1) + '/с';
    upgradeClickCostEl.textContent = getUpgradeClickCost();
    upgradeAutoCostEl.textContent = getUpgradeAutoCost();
    upgradeClickBtn.disabled = honey < getUpgradeClickCost();
    upgradeAutoBtn.disabled = honey < getUpgradeAutoCost();
}

// ========== КЛИК ==========
function handleClick(e) {
    const mult = getBoostMultiplier();
    let added = clickPower * mult;
    honey += added;

    const floatEl = document.createElement('div');
    floatEl.className = 'float-text';
    floatEl.textContent = '+' + added;
    const rect = hiveArea.getBoundingClientRect();
    floatEl.style.left = (e.clientX - rect.left) + 'px';
    floatEl.style.top = (e.clientY - rect.top) + 'px';
    hiveArea.appendChild(floatEl);
    setTimeout(() => floatEl.remove(), 800);

    clickBtn.style.transform = 'scale(0.9)';
    setTimeout(() => clickBtn.style.transform = '', 80);

    updateUI();
}

clickBtn.addEventListener('click', (e) => { e.preventDefault(); handleClick(e); });
clickBtn.addEventListener('touchstart', (e) => { e.preventDefault(); handleClick(e.touches[0]); });

// ========== АВТО-ДОХОД ==========
setInterval(() => {
    if (autoIncome > 0) {
        const mult = getBoostMultiplier();
        honey += autoIncome * mult / 10; // каждые 100 мс
        updateUI();
    }
}, 100);

// ========== УЛУЧШЕНИЯ ==========
upgradeClickBtn.addEventListener('click', () => {
    const cost = getUpgradeClickCost();
    if (honey >= cost) {
        honey -= cost;
        upgradeClickLevel++;
        clickPower += 1;
        updateUI();
    }
});
upgradeAutoBtn.addEventListener('click', () => {
    const cost = getUpgradeAutoCost();
    if (honey >= cost) {
        honey -= cost;
        upgradeAutoLevel++;
        autoIncome += 1;
        updateUI();
    }
});

// ========== КОНВЕРТАЦИЯ МЁДА В GRRR ==========
convertBtn.addEventListener('click', () => {
    if (honey < 10) {
        syncDebugEl.textContent = 'Нужно минимум 10 🍯';
        return;
    }
    let grrrEarned = Math.floor(honey / 10);
    if (grrrEarned > 0) {
        honey -= grrrEarned * 10;
        addGRRR(grrrEarned);
        updateUI();
    }
});

// Авто-конвертация каждые 5 сек
setInterval(() => {
    if (honey >= 10 && daily < LIMIT) {
        let grrrEarned = Math.min(Math.floor(honey / 10), LIMIT - daily);
        if (grrrEarned > 0) {
            honey -= grrrEarned * 10;
            addGRRR(grrrEarned);
            updateUI();
        }
    }
}, 5000);

// ========== ПЕРИОДИЧЕСКОЕ ОБНОВЛЕНИЕ БУСТА ==========
updateBoostUI();
setInterval(updateBoostUI, 30000); // каждые 30 сек проверяем окончание буста

// Инициализация
updateUI();
</script>
</body>
</html>
