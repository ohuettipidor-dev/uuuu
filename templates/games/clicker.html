<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>⛏️ Кликер • #GRRR</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
        body {
            font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
            background:linear-gradient(145deg,#1a1e2b 0%,#2a3142 100%);
            min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
            padding:12px; color:#fff; touch-action:manipulation;
        }
        .game-container {
            width:100%; max-width:420px; background:rgba(255,255,255,0.06); backdrop-filter:blur(20px);
            -webkit-backdrop-filter:blur(20px); border-radius:40px; padding:20px 16px 28px;
            box-shadow:0 30px 50px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            border:1px solid rgba(255,255,255,0.15);
        }
        .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; }
        .logo {
            font-weight:700; font-size:1.6rem; background:linear-gradient(135deg,#f9ca24,#f0932b);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; letter-spacing:-0.5px;
        }
        .balance-panel {
            background:rgba(0,0,0,0.35); border-radius:30px; padding:8px 16px; display:flex; align-items:center;
            gap:8px; border:1px solid rgba(255,215,0,0.3);
        }
        .grrr-icon { font-size:1.3rem; }
        .balance-text { font-weight:700; font-size:1.2rem; color:#ffeaa7; }
        .main-area { text-align:center; margin:16px 0; }
        .clicker {
            display:inline-block; width:120px; height:120px; background:radial-gradient(circle at 30% 30%, #ffeaa7, #f9ca24);
            border-radius:50%; box-shadow:0 15px 30px rgba(240,147,43,0.5); cursor:pointer;
            transition:transform 0.1s; position:relative; font-size:3rem; line-height:120px;
        }
        .clicker:active { transform:scale(0.9); }
        .energy-bar {
            width:100%; height:8px; background:rgba(255,255,255,0.2); border-radius:10px; margin:12px 0; overflow:hidden;
        }
        .energy-fill { height:100%; width:100%; background:linear-gradient(90deg,#f9ca24,#f0932b); border-radius:10px; transition:width 0.3s; }
        .upgrade-row { display:flex; justify-content:space-between; margin:8px 0; background:rgba(255,255,255,0.08); padding:10px; border-radius:15px; }
        .upgrade-btn {
            background:linear-gradient(135deg,#6c5ce7,#a29bfe); color:white; border:none; font-weight:600;
            padding:8px 16px; border-radius:20px; font-size:0.8rem; cursor:pointer; transition:all 0.2s;
        }
        .upgrade-btn:active { transform:scale(0.95); }
        .action-buttons { display:flex; flex-wrap:wrap; justify-content:center; gap:8px; margin:8px 0 16px; }
        .btn-yellow {
            background:linear-gradient(135deg,#f9ca24,#f0932b); color:#1a1e2b; border:none;
            font-weight:700; font-size:0.85rem; padding:10px 18px; border-radius:50px;
            box-shadow:0 8px 16px rgba(240,147,43,0.4); cursor:pointer; transition:all 0.2s;
            letter-spacing:0.3px; text-decoration:none; display:inline-block; text-align:center;
        }
        .btn-yellow:active { transform:scale(0.94); box-shadow:0 4px 10px rgba(240,147,43,0.6); }
        .beargram-section {
            margin-top:18px; display:flex; flex-direction:column; align-items:center; gap:12px;
            background:rgba(0,0,0,0.3); border-radius:30px; padding:16px 10px; border:1px solid rgba(255,255,255,0.1);
        }
        .btn {
            border:none; color:white; font-weight:700; font-size:1rem; padding:14px 28px; border-radius:50px;
            letter-spacing:0.5px; box-shadow:0 10px 20px rgba(0,0,0,0.3); cursor:pointer; transition:all 0.2s;
            text-decoration:none; display:inline-block; text-align:center;
        }
        .btn:active { transform:scale(0.96); }
        .btn-install { background:linear-gradient(135deg,#6c5ce7,#a29bfe); box-shadow:0 10px 20px rgba(108,92,231,0.5); }
        .btn-withdraw { background:linear-gradient(135deg,#f9ca24,#f0932b); color:#000; box-shadow:0 10px 20px rgba(240,147,43,0.6); }
        .beargram-text { font-size:0.8rem; color:#aaa; text-align:center; }
        .highlight { color:#ffeaa7; font-weight:600; }
        .toast {
            position:fixed; top:20px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.8);
            color:#fff; padding:12px 24px; border-radius:30px; font-weight:600; font-size:0.9rem;
            z-index:2000; animation:toastFadeIn 0.3s ease, toastFadeOut 0.5s ease 2.5s forwards;
            pointer-events:none; white-space:nowrap;
        }
        @keyframes toastFadeIn { from{opacity:0; transform:translateX(-50%) scale(0.8);} to{opacity:1; transform:translateX(-50%) scale(1);} }
        @keyframes toastFadeOut { from{opacity:1;} to{opacity:0; transform:translateX(-50%) translateY(-10px);} }
    </style>
</head>
<body>
<div class="game-container">
    <div class="header">
        <span class="logo">⛏️ Кликер</span>
        <div class="balance-panel">
            <span class="grrr-icon">🪙</span>
            <span class="balance-text" id="grrrBalance">0</span>
        </div>
    </div>
    <div class="main-area">
        <div class="clicker" id="clickerBtn">🪙</div>
        <div class="energy-bar"><div class="energy-fill" id="energyFill"></div></div>
        <div style="font-size:0.8rem; color:#ccc;">Энергия: <span id="energyText">100</span></div>
    </div>
    <div class="upgrade-row">
        <span>🔧 Уровень фермы: <strong id="farmLevel">1</strong></span>
        <button class="upgrade-btn" id="upgradeBtn">Улучшить (100🪙)</button>
    </div>
    <div class="action-buttons">
        <button class="btn-yellow" id="dailyBonusBtn">🎁 Бонус</button>
        <button class="btn-yellow" id="referralBtn">👥 Друзья</button>
    </div>
    <div class="beargram-section">
        <a class="btn btn-install" href="https://beargram.up.railway.app/" target="_blank" rel="noopener">🚀 Установить BearGram</a>
        <a class="btn btn-withdraw" href="https://beargram.up.railway.app/?utm_source=telegram_game&utm_medium=clicker&utm_campaign=withdraw" target="_blank" rel="noopener">💰 Вывести #GRRR</a>
        <div class="beargram-text">Фарми <span class="highlight">#GRRR</span> и выводи в рубли после регистрации</div>
    </div>
</div>
<script>
  (function() {
    const STORAGE_KEY = 'grrr_balance';
    const DAILY_KEY = 'grrr_daily';
    const LIMIT = 100;
    let balance = parseInt(localStorage.getItem(STORAGE_KEY) || '0');
    let daily = parseInt(localStorage.getItem(DAILY_KEY) || '0');
    const today = new Date().toDateString();
    if (localStorage.getItem('grrr_date') !== today) { daily = 0; localStorage.setItem(DAILY_KEY, '0'); localStorage.setItem('grrr_date', today); }

    let farmLevel = parseInt(localStorage.getItem('clicker_farm') || '1');
    let energy = parseInt(localStorage.getItem('clicker_energy') || '100');

    function save() {
        localStorage.setItem(STORAGE_KEY, balance);
        localStorage.setItem(DAILY_KEY, daily);
        localStorage.setItem('clicker_farm', farmLevel);
        localStorage.setItem('clicker_energy', energy);
    }
    function updateUI() {
        document.getElementById('grrrBalance').textContent = balance;
        document.getElementById('farmLevel').textContent = farmLevel;
        document.getElementById('energyFill').style.width = (energy/100*100) + '%';
        document.getElementById('energyText').textContent = energy;
        let cost = farmLevel * 100;
        document.getElementById('upgradeBtn').textContent = `Улучшить (${cost}🪙)`;
        document.getElementById('upgradeBtn').disabled = balance < cost;
    }
    function addGRRR(amount) {
        if (daily >= LIMIT) return false;
        let add = Math.min(amount, LIMIT - daily);
        balance += add; daily += add; save(); updateUI();
        return true;
    }
    function showToast(text) {
        const toast = document.createElement('div'); toast.className = 'toast'; toast.textContent = text;
        document.body.appendChild(toast); setTimeout(() => { if (toast.parentNode) toast.remove(); }, 3000);
    }

    // Звук монетки
    let audioCtx = null;
    function playCoinSound() {
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, now);
            osc.frequency.exponentialRampToValueAtTime(400, now + 0.1);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(now); osc.stop(now + 0.15);
        } catch(e) {}
    }

    document.getElementById('clickerBtn').addEventListener('click', () => {
        if (energy <= 0) { showToast('⚡ Нет энергии'); return; }
        if (!addGRRR(farmLevel)) { showToast('🚫 Дневной лимит'); return; }
        energy--;
        playCoinSound();
        save();
        updateUI();
    });

    document.getElementById('upgradeBtn').addEventListener('click', () => {
        let cost = farmLevel * 100;
        if (balance < cost) { showToast('Недостаточно 🪙'); return; }
        balance -= cost;
        farmLevel++;
        energy = 100;
        save();
        updateUI();
        showToast(`🎉 Уровень ${farmLevel}!`);
    });

    setInterval(() => {
        if (energy < 100) { energy = Math.min(100, energy + 1); save(); updateUI(); }
    }, 3000);

    document.getElementById('dailyBonusBtn').addEventListener('click', () => {
        const last = localStorage.getItem('grrr_bonus_date');
        if (last === today) { showToast('🎁 Уже получен'); return; }
        localStorage.setItem('grrr_bonus_date', today);
        addGRRR(10);
        showToast('🎁 +10 🪙');
    });

    document.getElementById('referralBtn').addEventListener('click', () => {
        const ref = localStorage.getItem('refId') || Math.random().toString(36).substr(2,8);
        localStorage.setItem('refId', ref);
        const url = location.origin + location.pathname + '?ref=' + ref;
        if (navigator.share) navigator.share({title:'Кликер • #GRRR', text:'Фарми крипту!', url});
        else prompt('Ссылка:', url);
        addGRRR(5);
        showToast('📨 +5 🪙');
    });

    const refParam = new URLSearchParams(location.search).get('ref');
    if (refParam && !localStorage.getItem('refUsed')) {
        localStorage.setItem('refUsed', '1');
        addGRRR(10);
        showToast('🎁 +10 🪙 за друга');
    }

    updateUI();
  })();
</script>
<a href="/games" style="position:fixed;top:10px;left:10px;z-index:1000;background:rgba(0,0,0,0.5);color:#f9ca24;padding:8px 14px;border-radius:20px;text-decoration:none;font-size:13px;font-weight:bold;">← Игры</a>
</body>
</html>
