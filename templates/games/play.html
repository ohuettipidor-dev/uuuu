<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>{{ game.title }} | BearGram</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
        body{background:#1a1e2b;min-height:100vh;display:flex;flex-direction:column;position:relative}
        .game-header{display:flex;align-items:center;gap:12px;padding:10px 12px;background:rgba(255,255,255,0.05);flex-shrink:0;z-index:10}
        .back-btn{color:#f9ca24;text-decoration:none;font-size:15px}
        .game-title{color:white;font-weight:bold;font-size:15px;flex:1}
        .game-author{color:#aaa;font-size:10px}
        .game-frame{flex:1;width:100%;border:none}

        /* Боковые панели */
        .side-panel{position:fixed;right:0;top:45px;bottom:0;width:45px;display:flex;flex-direction:column;gap:4px;padding:4px;z-index:20;pointer-events:none}
        .side-panel>*{pointer-events:auto}
        .side-btn{
            width:38px;height:38px;border-radius:12px 0 0 12px;background:rgba(0,0,0,0.6);
            border:1px solid rgba(255,255,255,0.1);border-right:none;
            display:flex;align-items:center;justify-content:center;
            font-size:16px;cursor:pointer;transition:0.2s;color:#aaa;
            backdrop-filter:blur(5px);
        }
        .side-btn.active{background:rgba(249,202,36,0.2);color:#f9ca24;border-color:rgba(249,202,36,0.4)}
        .side-popup{
            position:fixed;right:50px;top:45px;bottom:0;width:200px;
            background:rgba(0,0,0,0.85);backdrop-filter:blur(10px);
            border-left:1px solid rgba(255,255,255,0.1);
            padding:10px;overflow-y:auto;display:none;z-index:19;
        }
        .side-popup.show{display:block}
        .side-popup h4{color:#f9ca24;font-size:12px;margin-bottom:8px}
        .skins-bar{display:flex;gap:6px;flex-wrap:wrap}
        .skin-dot{width:24px;height:24px;border-radius:50%;border:2px solid rgba(255,255,255,0.3);cursor:pointer}
        .review-item{background:rgba(255,255,255,0.05);padding:5px 6px;border-radius:6px;margin:3px 0;font-size:10px}
        .review-item .author{font-weight:bold;color:#fff;font-size:10px}
        .review-item .stars{color:#f9ca24;font-size:10px}
        .review-item .text{color:#aaa;font-size:9px}
        .review-item .date{color:#666;font-size:8px}
        .review-form{display:flex;gap:4px;margin-top:6px}
        .review-form select,.review-form input{flex:1;padding:5px;border-radius:6px;background:rgba(255,255,255,0.1);color:white;border:none;font-size:10px}
        .review-form button{background:#f9ca24;color:#000;border:none;padding:5px 10px;border-radius:6px;cursor:pointer;font-weight:bold;font-size:10px}
        .skin-link{display:block;text-align:center;padding:6px;color:#a29bfe;text-decoration:none;font-size:11px;margin-top:6px}
    </style>
</head>
<body>
    <div class="game-header">
        <a href="/games" class="back-btn">← Игры</a>
        <div class="game-title">{{ game.title }}</div>
        <div class="game-author">@{{ game.user.username }}</div>
    </div>

    <iframe src="{{ game.file_path }}" class="game-frame"></iframe>

    <!-- Боковые кнопки -->
    <div class="side-panel">
        <button class="side-btn active" onclick="togglePanel('skins')" title="Скины">🎨</button>
        <button class="side-btn" onclick="togglePanel('reviews')" title="Отзывы">⭐</button>
    </div>

    <!-- Панель скинов -->
    <div class="side-popup" id="skinsPanel">
        <h4>🎨 Скины</h4>
        {% if skins %}
        <div class="skins-bar">
            {% for skin in skins %}
            <div class="skin-dot" style="background:{{ skin.preview_color }};" title="{{ skin.name }} — {{ skin.price }} 💎" onclick="buySkin({{ skin.id }})"></div>
            {% endfor %}
        </div>
        {% else %}
        <p style="color:#888;font-size:11px;">Нет скинов</p>
        {% endif %}
        <a href="/games/skins" class="skin-link">Мастерская →</a>
    </div>

    <!-- Панель отзывов -->
    <div class="side-popup" id="reviewsPanel">
        <h4>⭐ Отзывы</h4>
        <div id="reviewsList"></div>
        <form class="review-form" onsubmit="submitReview(event, {{ game.id }})">
            <select id="reviewRating">
                <option value="5">5⭐</option><option value="4">4⭐</option><option value="3">3⭐</option><option value="2">2⭐</option><option value="1">1⭐</option>
            </select>
            <input type="text" id="reviewText" placeholder="Отзыв...">
            <button type="submit">📤</button>
        </form>
    </div>

    <script>
        let openPanel = 'skins';

        function togglePanel(panel) {
            const skinsBtn = document.querySelectorAll('.side-btn')[0];
            const reviewsBtn = document.querySelectorAll('.side-btn')[1];
            const skinsPanel = document.getElementById('skinsPanel');
            const reviewsPanel = document.getElementById('reviewsPanel');

            if (openPanel === panel) {
                // Закрыть
                skinsPanel.classList.remove('show');
                reviewsPanel.classList.remove('show');
                skinsBtn.classList.remove('active');
                reviewsBtn.classList.remove('active');
                openPanel = null;
            } else {
                // Открыть нужную
                skinsPanel.classList.toggle('show', panel === 'skins');
                reviewsPanel.classList.toggle('show', panel === 'reviews');
                skinsBtn.classList.toggle('active', panel === 'skins');
                reviewsBtn.classList.toggle('active', panel === 'reviews');
                openPanel = panel;
            }
        }

        async function buySkin(id){
            if(confirm('Купить?')){
                const r=await fetch('/games/skins/buy/'+id,{method:'POST'});
                const d=await r.json();
                alert(d.success?'✅ '+d.message:d.error);
                if(d.success)location.reload();
            }
        }

        async function loadReviews(gid){
            const r=await fetch('/games/reviews/'+gid);
            const d=await r.json();
            let h='';
            if(!d.reviews.length)h='<p style="color:#888;font-size:10px;">Нет отзывов</p>';
            else d.reviews.forEach(r=>{
                h+=`<div class="review-item"><span class="author">@${r.author}</span> <span class="stars">${'⭐'.repeat(r.rating)}</span><div class="text">${r.text||''}</div><div class="date">${r.date}</div></div>`;
            });
            document.getElementById('reviewsList').innerHTML=h;
        }

        async function submitReview(e,gid){
            e.preventDefault();
            const r=document.getElementById('reviewRating').value;
            const t=document.getElementById('reviewText').value;
            const res=await fetch('/games/review/'+gid,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:'rating='+r+'&text='+encodeURIComponent(t)});
            const d=await res.json();
            if(d.success){alert('✅ Отзыв отправлен!');document.getElementById('reviewText').value='';loadReviews(gid)}else alert(d.error);
        }

        loadReviews({{ game.id }});
    </script>
</body>
</html>
