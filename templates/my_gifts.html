<!DOCTYPE html>
<html>
<head>
    <title>🎁 Мои подарки | BearGram</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
        body{background:linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fbc2eb 100%);min-height:100vh}
        .container{max-width:600px;margin:0 auto;padding:20px}
        .header{display:flex;align-items:center;gap:15px;margin-bottom:20px}
        .back{background:#ff6b6b;padding:8px 18px;border-radius:25px;color:white;text-decoration:none}
        h2{color:#333}
        .gift-card{background:rgba(255,255,255,0.95);border-radius:24px;padding:18px;margin-bottom:12px;display:flex;align-items:center;gap:15px;border:1px solid rgba(255,107,107,0.2)}
        .gift-icon{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#ffd700,#ffed4e);display:flex;align-items:center;justify-content:center;font-size:28px}
        .gift-info{flex:1}
        .gift-from{font-size:12px;color:#888}
        .gift-name{font-weight:600;color:#333;font-size:16px}
        .gift-message{font-size:12px;color:#888;margin-top:4px;font-style:italic}
        .use-btn{background:#ff6b6b;color:white;border:none;padding:8px 20px;border-radius:30px;cursor:pointer;font-weight:500}
        .empty{text-align:center;padding:60px;color:#888}
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <a href="/chat" class="back">← Назад</a>
        <h2>🎁 Мои подарки</h2>
    </div>
    
    {% for gift in gifts %}
    <div class="gift-card">
        <div class="gift-icon">🎁</div>
        <div class="gift-info">
            <div class="gift-from">от {{ gift.from_user.username }}</div>
            <div class="gift-name">{{ gift.gift.name }}</div>
            {% if gift.gift.message %}
            <div class="gift-message">"{{ gift.gift.message }}"</div>
            {% endif %}
        </div>
        <button class="use-btn" onclick="useGift({{ gift.id }})">Активировать</button>
    </div>
    {% else %}
    <div class="empty">
        <span style="font-size:48px">🎁</span>
        <p>У вас пока нет подарков</p>
        <p style="font-size:13px;margin-top:8px">Кто-нибудь обязательно вас порадует!</p>
    </div>
    {% endfor %}
</div>

<script>
    function useGift(giftId) {
        fetch('/gifts/use/' + giftId, {method: 'POST'})
            .then(r => r.json())
            .then(data => {
                if(data.success) {
                    alert('Подарок активирован!');
                    location.reload();
                } else {
                    alert('Ошибка: ' + data.error);
                }
            });
    }
</script>
</body>
</html>
