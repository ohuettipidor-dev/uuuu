<!DOCTYPE html>
<html>
<head>
    <title>🐻 {{ profile_user.username }} | BearGram</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fbc2eb 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card{
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 40px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.5);
        }
        .avatar-large{
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 48px;
            font-weight: bold;
            color: white;
            overflow: hidden;
        }
        .avatar-large img{
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        h2{
            color: #333;
            margin-bottom: 8px;
        }
        .username-link{
            color: #aaa;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .info{
            color: #666;
            margin-bottom: 24px;
            font-size: 14px;
        }
        .btn{
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-secondary{
            background: transparent;
            border: 1px solid #ff6b6b;
            color: #ff6b6b;
        }
        .btn:hover{
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255,107,107,0.3);
        }
        .back-link{
            margin-top: 20px;
        }
        .back-link a{
            color: #ff6b6b;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="avatar-large">
        {% if profile_user.avatar != 'default.png' %}
            <img src="/static/avatars/{{ profile_user.avatar }}">
        {% else %}
            🐻
        {% endif %}
    </div>
    <h2>{{ profile_user.username }}</h2>
    <div class="username-link">{{ profile_user.username_link }}</div>
    <div class="info">
        <p>🐾 Присоединился к BearGram</p>
        <p>📅 {{ profile_user.created_at.strftime('%d.%m.%Y') if profile_user.created_at else 'Недавно' }}</p>
    </div>
    <div class="back-link">
        <a href="/chat" class="btn btn-secondary">← Вернуться в чат</a>
    </div>
</div>
</body>
</html>
