<!DOCTYPE html>
<html>
<head>
    <title>📞 Звонок с {{ other_user.username }} | BearGram</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
        body{background:#0a0a0a;height:100vh;display:flex;align-items:center;justify-content:center}
        .call-container{width:100%;max-width:800px;height:100vh;display:flex;flex-direction:column;background:#0f0f1a}
        .video-container{flex:1;display:flex;flex-direction:column;padding:16px;gap:16px;position:relative}
        .remote-video{flex:1;background:#1a1a2e;border-radius:24px;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
        .remote-video video{width:100%;height:100%;object-fit:cover}
        .waiting-text{position:absolute;color:#888;font-size:16px;text-align:center}
        .local-video{position:absolute;bottom:20px;right:20px;width:120px;height:160px;background:#1a1a2e;border-radius:16px;overflow:hidden;border:2px solid #ff6b6b;z-index:10}
        .local-video video{width:100%;height:100%;object-fit:cover}

        /* Аудио-режим */
        .audio-only .remote-video{background:linear-gradient(135deg,#1a1a2e,#0f0f1a)}
        .audio-only .local-video{display:none}
        .audio-avatar-container{
            display:flex;flex-direction:column;align-items:center;justify-content:center;
            position:relative;width:100%;height:100%;
        }
        .audio-avatar{
            width:120px;height:120px;border-radius:50%;background:linear-gradient(135deg,#ff6b6b,#ff8e8e);
            display:flex;align-items:center;justify-content:center;font-size:60px;color:white;
            overflow:hidden;z-index:2;position:relative;
        }
        .audio-avatar img{width:100%;height:100%;object-fit:cover}
        .caller-name{color:white;font-size:24px;font-weight:bold;margin-top:20px;z-index:2}
        .call-status{color:#aaa;font-size:14px;margin-top:8px;z-index:2}

        /* Звуковые волны */
        .voice-waves{
            position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
            width:120px;height:120px;z-index:1;
        }
        .wave{
            position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
            border-radius:50%;border:2px solid rgba(255,107,107,0.4);
            animation:wavePulse 2s ease-out infinite;
            opacity:0;
        }
        .wave:nth-child(1){width:120px;height:120px;animation-delay:0s}
        .wave:nth-child(2){width:120px;height:120px;animation-delay:0.4s}
        .wave:nth-child(3){width:120px;height:120px;animation-delay:0.8s}
        @keyframes wavePulse{
            0%{width:120px;height:120px;opacity:0.6;border-color:rgba(255,107,107,0.8)}
            100%{width:220px;height:220px;opacity:0;border-color:rgba(255,107,107,0)}
        }
        .wave.active{animation-duration:0.8s}
        .wave.inactive{animation-play-state:paused;opacity:0}

        .controls{display:flex;gap:20px;justify-content:center;padding:20px;background:#1e1e2e;flex-shrink:0}
        .control-btn{width:60px;height:60px;border-radius:50%;border:none;font-size:24px;cursor:pointer;transition:transform 0.2s}
        .control-btn:hover{transform:scale(1.05)}
        .hangup{background:#ff4444;color:white}
        .mic{background:#3a3a4e;color:white}
        .camera{background:#3a3a4e;color:white}
        .status{text-align:center;padding:10px;color:#888;font-size:14px;background:#1e1e2e;flex-shrink:0}
        @media (max-width:480px){
            .local-video{width:90px;height:120px}
            .control-btn{width:50px;height:50px;font-size:20px}
            .audio-avatar{width:100px;height:100px;font-size:50px}
            .caller-name{font-size:20px}
        }
    </style>
</head>
<body>
<div class="call-container" id="callContainer">
    <div class="video-container">
        <div class="remote-video">
            <video id="remoteVideo" autoplay playsinline></video>
            <div id="waitingText" class="waiting-text">⏳ Ожидание подключения...</div>
            <!-- Аудио-режим -->
            <div id="audioModeUI" style="display:none; width:100%; height:100%; position:absolute; top:0; left:0;">
                <div class="audio-avatar-container">
                    <div class="voice-waves" id="voiceWaves">
                        <div class="wave"></div>
                        <div class="wave"></div>
                        <div class="wave"></div>
                    </div>
                    <div class="audio-avatar">
                        {% if other_user.avatar != 'default.png' %}
                            <img src="/static/avatars/{{ other_user.avatar }}">
                        {% else %}
                            🐻
                        {% endif %}
                    </div>
                    <div class="caller-name">{{ other_user.username }}</div>
                    <div class="call-status" id="callStatus">📞 Звоним...</div>
                </div>
            </div>
        </div>
        <div class="local-video" id="localVideoContainer">
            <video id="localVideo" autoplay playsinline muted></video>
        </div>
    </div>
    <div class="controls" id="controls">
        <button class="control-btn mic" id="micBtn" onclick="toggleMic()">🎤</button>
        <button class="control-btn camera" id="cameraBtn" onclick="toggleCamera()">📷</button>
        <button class="control-btn hangup" onclick="hangUp()">🔴</button>
    </div>
    <div class="status" id="status">🔒 Соединение защищено</div>
</div>

<script>
    const room_id = "{{ room_id }}";
    const isAudioOnly = new URLSearchParams(window.location.search).get('audio') === '1';
    let localStream = null;
    let peerConnection = null;
    let isMicOn = true;
    let isCameraOn = !isAudioOnly;
    let audioContext = null;
    let analyser = null;
    let remoteAudioStream = null;

    const configuration = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
            { urls: 'stun:stun2.l.google.com:19302' }
        ]
    };

    let pollInterval = null;

    async function init() {
        try {
            if (isAudioOnly) {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                document.getElementById('callContainer').classList.add('audio-only');
                document.getElementById('audioModeUI').style.display = 'block';
                document.getElementById('localVideoContainer').style.display = 'none';
                document.getElementById('cameraBtn').style.display = 'none';
                document.getElementById('waitingText').innerText = '📞 Звоним...';
                // Инициализируем аудиоконтекст для визуализации волн
                try {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                } catch(e) { console.log('AudioContext не поддерживается'); }
            } else {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('localVideo').srcObject = localStream;
            }
            document.getElementById('waitingText')?.remove();
            startPolling();
        } catch(e) {
            document.getElementById('status').innerHTML = '❌ Нет доступа к микрофону/камере';
            console.error(e);
        }
    }

    function startPolling() {
        checkAndCreateOffer();
        pollInterval = setInterval(() => {
            checkSignaling();
        }, 2000);
    }

    async function checkAndCreateOffer() {
        const urlParams = new URLSearchParams(window.location.search);
        const isInitiator = !urlParams.has('existing');

        if(isInitiator && !peerConnection) {
            await createOffer();
        }
    }

    async function checkSignaling() {
        const response = await fetch(`/get_signaling/${room_id}`);
        const data = await response.json();

        if(data.offer && !peerConnection) {
            await handleOffer(data.offer);
        }
        if(data.answer && peerConnection && peerConnection.signalingState === 'have-local-offer') {
            await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
        }
        if(data.candidate && peerConnection) {
            try {
                await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
            } catch(e) { console.log('ICE кандидат ошибка', e); }
        }
    }

    async function createOffer() {
        peerConnection = new RTCPeerConnection(configuration);

        localStream.getTracks().forEach(track => {
            peerConnection.addTrack(track, localStream);
        });

        peerConnection.ontrack = (event) => {
            if (!isAudioOnly) {
                document.getElementById('remoteVideo').srcObject = event.streams[0];
            }
            document.getElementById('status').innerHTML = '🟢 В звонке';
            document.getElementById('waitingText')?.remove();
            if (isAudioOnly) {
                document.getElementById('callStatus').innerText = '🟢 Говорите';
                // Подключаем анализатор для волн
                if (audioContext && event.streams[0]) {
                    remoteAudioStream = event.streams[0];
                    analyser = audioContext.createAnalyser();
                    const source = audioContext.createMediaStreamSource(remoteAudioStream);
                    source.connect(analyser);
                    analyser.fftSize = 256;
                    startVoiceWaveDetection();
                }
            }
        };

        peerConnection.onicecandidate = (event) => {
            if(event.candidate) {
                sendIceCandidate(event.candidate);
            }
        };

        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);
        sendOffer(offer);
    }

    async function handleOffer(offer) {
        peerConnection = new RTCPeerConnection(configuration);

        localStream.getTracks().forEach(track => {
            peerConnection.addTrack(track, localStream);
        });

        peerConnection.ontrack = (event) => {
            if (!isAudioOnly) {
                document.getElementById('remoteVideo').srcObject = event.streams[0];
            }
            document.getElementById('status').innerHTML = '🟢 В звонке';
            document.getElementById('waitingText')?.remove();
            if (isAudioOnly) {
                document.getElementById('callStatus').innerText = '🟢 Говорите';
                if (audioContext && event.streams[0]) {
                    remoteAudioStream = event.streams[0];
                    analyser = audioContext.createAnalyser();
                    const source = audioContext.createMediaStreamSource(remoteAudioStream);
                    source.connect(analyser);
                    analyser.fftSize = 256;
                    startVoiceWaveDetection();
                }
            }
        };

        peerConnection.onicecandidate = (event) => {
            if(event.candidate) {
                sendIceCandidate(event.candidate);
            }
        };

        await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
        const answer = await peerConnection.createAnswer();
        await peerConnection.setLocalDescription(answer);
        sendAnswer(answer);
    }

    // Визуализация голосовых волн
    function startVoiceWaveDetection() {
        if (!analyser) return;
        const dataArray = new Uint8Array(analyser.frequencyBinCount);
        const waves = document.querySelectorAll('.wave');

        function updateWaves() {
            if (!analyser) return;
            analyser.getByteFrequencyData(dataArray);
            // Считаем среднюю громкость
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) {
                sum += dataArray[i];
            }
            const avg = sum / dataArray.length;
            // Если громкость выше порога, ускоряем анимацию
            waves.forEach(w => {
                if (avg > 20) {
                    w.classList.add('active');
                    w.classList.remove('inactive');
                } else {
                    w.classList.add('inactive');
                    w.classList.remove('active');
                }
            });
            requestAnimationFrame(updateWaves);
        }
        updateWaves();
    }

    function sendOffer(offer) {
        fetch('/send_offer', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({room_id: room_id, offer: offer})
        });
    }

    function sendAnswer(answer) {
        fetch('/send_answer', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({room_id: room_id, answer: answer})
        });
    }

    function sendIceCandidate(candidate) {
        fetch('/send_ice_candidate', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({room_id: room_id, candidate: candidate})
        });
    }

    function toggleMic() {
        if(localStream) {
            const audioTracks = localStream.getAudioTracks();
            audioTracks.forEach(track => track.enabled = !track.enabled);
            isMicOn = !isMicOn;
            document.getElementById('micBtn').style.background = isMicOn ? '#3a3a4e' : '#ff4444';
        }
    }

    function toggleCamera() {
        if(localStream && !isAudioOnly) {
            const videoTracks = localStream.getVideoTracks();
            videoTracks.forEach(track => track.enabled = !track.enabled);
            isCameraOn = !isCameraOn;
            document.getElementById('cameraBtn').style.background = isCameraOn ? '#3a3a4e' : '#ff4444';
        }
    }

    function hangUp() {
        fetch('/end_call/' + room_id, {method: 'POST'});
        if(pollInterval) clearInterval(pollInterval);
        if(peerConnection) peerConnection.close();
        if(localStream) localStream.getTracks().forEach(track => track.stop());
        if(audioContext) audioContext.close();
        window.close();
    }

    init();
</script>
</body>
</html>
