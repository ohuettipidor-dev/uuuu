<!DOCTYPE html>
<html>
<head>
    <title>🐻 {{ group.name }} | BearGram</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
        body{background:linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fbc2eb 100%);min-height:100vh}
        .container{max-width:700px;margin:0 auto;height:100vh;display:flex;flex-direction:column}
        .header{padding:8px 12px;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(255,107,107,0.2);flex-shrink:0}
        .back{background:#ff6b6b;padding:5px 12px;border-radius:25px;cursor:pointer;color:white;font-weight:500;text-decoration:none;font-size:13px}
        .avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg, #ff6b6b, #ff8e8e);display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;flex-shrink:0}
        .avatar img{width:100%;height:100%;object-fit:cover}
        .group-info{flex:1;cursor:pointer;min-width:0}
        .group-name{font-weight:600;font-size:14px;color:#333;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .member-count{font-size:10px;color:#888}
        .profile-btn{background:rgba(255,255,255,0.9);padding:5px 10px;border-radius:25px;font-size:13px;text-decoration:none;color:#ff6b6b;flex-shrink:0}
        .settings-btn{background:none;border:none;cursor:pointer;font-size:16px;padding:6px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#888;width:32px;height:32px}
        .messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:4px}
        .message{display:flex;position:relative}
        .message.sent{justify-content:flex-end}
        .message.received{justify-content:flex-start}
        .bubble{max-width:75%;padding:6px 12px;border-radius:18px;font-size:14px;word-wrap:break-word}
        .sent .bubble{background:linear-gradient(135deg, #ff6b6b, #ff8e8e);color:white;border-bottom-right-radius:4px}
        .received .bubble{background:white;color:#333;border-bottom-left-radius:4px;box-shadow:0 1px 2px rgba(0,0,0,0.05)}
        .time{font-size:9px;color:#aaa;margin-top:2px}
        .input-area{display:flex;align-items:center;gap:6px;padding:8px 12px;background:rgba(255,255,255,0.96);border-top:1px solid rgba(255,107,107,0.2);flex-shrink:0}
        .input-wrapper{flex:1;background:#f0f0f0;border-radius:25px;display:flex;align-items:center;padding:2px 6px}
        #msgInput{flex:1;background:none;border:none;color:#333;font-size:14px;padding:8px 2px;outline:none}
        .send-btn{background:#ff6b6b;color:white;border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;font-size:18px;border:none;cursor:pointer}
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <a href="/chat" class="back">←</a>
        <div class="avatar" onclick="document.getElementById('avatarInput').click()">
            {% if group.avatar != 'group_default.png' %}<img src="/static/avatars/{{ group.avatar }}">{% else %}👥{% endif %}
        </div>
        <div class="group-info" onclick="location.href='/group/{{ group.id }}/info'">
            <div class="group-name">{{ group.name }}</div>
            <div class="member-count">{{ members|length }} участников</div>
        </div>
        <button class="settings-btn" onclick="location.href='/group/{{ group.id }}/info'">⚙️</button>
        <a href="/profile" class="profile-btn">🧸</a>
        <form id="avatarForm" method="POST" action="/group/{{ group.id }}/upload_avatar" enctype="multipart/form-data" style="display:none">
            <input type="file" name="avatar" id="avatarInput" accept="image/*" onchange="this.form.submit()">
        </form>
    </div>

    <div class="messages" id="messages">
        {% for m in messages %}
        <div class="message {% if m.sender_id == current_user.id %}sent{% else %}received{% endif %}">
            <div class="bubble">
                {% if m.content %}<div>{{ m.content }}</div>{% endif %}
                <div class="time">{{ m.timestamp.strftime('%H:%M') }}</div>
            </div>
        </div>
        {% endfor %}
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" id="msgInput" placeholder="Сообщение...">
        </div>
        <button class="send-btn" id="sendBtn" onclick="sendMsg()">🐻</button>
    </div>
</div>

<script>
const group_id = {{ group.id }};
const msgInput = document.getElementById('msgInput');

async function sendMsg() {
    const content = msgInput.value.trim();
    if (!content) return;

    const formData = new FormData();
    formData.append('group_id', group_id);
    formData.append('content', content);

    try {
        const response = await fetch('/send_group', {
            method: 'POST',
            body: formData
        });
        const result = await response.json();
        if (result.success) {
            msgInput.value = '';
            location.reload();
        } else {
            alert('Ошибка: ' + (result.error || 'Неизвестная ошибка'));
        }
    } catch (error) {
        alert('Ошибка сети: ' + error.message);
    }
}
</script>
</body>
</html>
