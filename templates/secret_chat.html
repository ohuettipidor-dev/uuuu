<!DOCTYPE html>
<html>
<head>
    <title>🔒 Секретный чат с {{ other_user.username }} | BearGram</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
        body{background:linear-gradient(135deg, #1a1a2e, #16213e);min-height:100vh}
        .container{max-width:700px;margin:0 auto;height:100vh;display:flex;flex-direction:column}
        .header{padding:10px 12px;background:rgba(0,0,0,0.8);backdrop-filter:blur(10px);display:flex;align-items:center;gap:8px;border-bottom:2px solid #ff6b6b;flex-shrink:0}
        .back{background:#ff6b6b;padding:5px 12px;border-radius:25px;cursor:pointer;color:white;font-weight:500;text-decoration:none;font-size:13px}
        .avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#ff6b6b,#ff8e8e);display:flex;align-items:center;justify-content:center;overflow:hidden}
        .avatar img{width:100%;height:100%;object-fit:cover}
        .profile-btn{background:rgba(255,255,255,0.9);padding:5px 12px;border-radius:25px;font-size:13px;transition:all 0.2s;text-decoration:none;color:#ff6b6b}
        .profile-btn:hover{background:white;transform:translateY(-1px)}
        .messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
        .message{display:flex;animation:fadeInUp 0.2s ease;position:relative}
        @keyframes fadeInUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .message.sent{justify-content:flex-end}
        .message.received{justify-content:flex-start}
        .bubble{max-width:75%;padding:8px 14px;border-radius:18px;font-size:14px;word-wrap:break-word;position:relative}
        .sent .bubble{background:#ff6b6b;color:white;border-bottom-right-radius:4px}
        .received .bubble{background:#2a2a3e;color:#e0e0e0;border-bottom-left-radius:4px}
        .time{font-size:10px;color:#888;margin-top:4px;display:flex;align-items:center;gap:4px}
        .sent .time{justify-content:flex-end}
        .encrypted-badge{font-size:9px;color:#4cd964;margin-left:6px}
        .burn-badge{background:#ff4444;color:white;border-radius:10px;padding:2px 6px;font-size:9px;margin-left:6px;display:inline-block}
        .input-area{display:flex;align-items:center;gap:8px;padding:10px 12px;background:rgba(0,0,0,0.8);border-top:2px solid #ff6b6b;flex-shrink:0}
        .input-wrapper{flex:1;background:#1a1a2e;border-radius:25px;display:flex;align-items:center;gap:6px;padding:4px 12px}
        .input-wrapper input{flex:1;background:none;border:none;color:white;font-size:15px;padding:10px 0;outline:none}
        .input-wrapper input::placeholder{color:#666}
        .send-btn{background:#ff6b6b;color:white;border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;border:none}
        .send-btn:hover{background:#ff5252;transform:scale(1.02)}
        .burn-checkbox{display:flex;align-items:center;gap:6px;margin-top:6px;font-size:11px;color:#aaa}
        .burn-checkbox input{cursor:pointer}
        @media (max-width:480px){.bubble{max-width:85%;padding:6px 10px;font-size:13px}}
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <a href="/secret_chats" class="back">←</a>
        <div class="avatar">
            {% if other_user.avatar != 'default.png' %}
                <img src="/static/avatars/{{ other_user.avatar }}">
            {% else %}
                🐼
            {% endif %}
        </div>
        <div style="flex:1">
            <strong style="color:white">{{ other_user.username }}</strong>
            <span style="background:#ff6b6b;padding:2px 8px;border-radius:20px;font-size:10px;margin-left:8px">🔒 Секретный чат</span>
        </div>
        <a href="/profile" class="profile-btn">🧸</a>
    </div>
    
    <div class="messages" id="messages">
        {% for m in messages %}
        <div class="message {% if m.is_own %}sent{% else %}received{% endif %}" data-id="{{ m.id }}">
            <div class="bubble">
                <div class="message-content">{{ m.content }}</div>
                {% if m.is_burn_after_read %}
                <div><span class="burn-badge">🔥 Самоуничтожение</span></div>
                {% endif %}
                <div class="time">
                    <span>{{ m.timestamp.strftime('%H:%M') }}</span>
                    <span class="encrypted-badge">🔒 зашифровано AES-256</span>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
    
    <div class="input-area">
        <div style="flex:1">
            <div class="input-wrapper">
                <input type="text" id="msgInput" placeholder="🔒 Сообщение зашифруется AES-256...">
                <button class="send-btn" onclick="sendSecret()">🐻</button>
            </div>
            <div class="burn-checkbox">
                <input type="checkbox" id="burnAfterRead">
                <label for="burnAfterRead">🔥 Самоуничтожение через 5 секунд после прочтения</label>
            </div>
        </div>
    </div>
</div>

<script>
    const chat_id = {{ secret_chat.id }};
    const msgInput = document.getElementById('msgInput');
    const burnCheckbox = document.getElementById('burnAfterRead');
    let lastMsgId = {{ messages[-1].id if messages else 0 }};
    let pollingInterval = null;
    
    function escapeHtml(text) {
        if(!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function addNewMessage(msg) {
        const messagesDiv = document.getElementById('messages');
        const div = document.createElement('div');
        div.className = `message ${msg.is_own ? 'sent' : 'received'}`;
        div.setAttribute('data-id', msg.id);
        
        let burnHtml = msg.is_burn_after_read ? '<div><span class="burn-badge">🔥 Самоуничтожение</span></div>' : '';
        
        div.innerHTML = `
            <div class="bubble">
                <div class="message-content">${escapeHtml(msg.content)}</div>
                ${burnHtml}
                <div class="time">
                    <span>${msg.timestamp}</span>
                    <span class="encrypted-badge">🔒 зашифровано AES-256</span>
                </div>
            </div>
        `;
        
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        lastMsgId = msg.id;
        
        if(msg.is_burn_after_read && !msg.is_own) {
            setTimeout(() => { if(div) div.remove(); }, 5000);
        }
    }
    
    function checkNewMessages() {
        fetch(`/get_secret_messages/${chat_id}/${lastMsgId}`)
            .then(r => r.json())
            .then(msgs => msgs.forEach(m => addNewMessage(m)));
    }
    
    function sendSecret() {
        let content = msgInput.value.trim();
        if(!content) return;
        
        let formData = new FormData();
        formData.append('chat_id', chat_id);
        formData.append('content', content);
        formData.append('burn_after_read', burnCheckbox.checked ? 'true' : 'false');
        
        fetch('/send_secret', {
            method: 'POST',
            body: formData
        }).then(() => {
            msgInput.value = '';
            burnCheckbox.checked = false;
            setTimeout(checkNewMessages, 500);
        });
    }
    
    msgInput.addEventListener('keypress', e => { if(e.key === 'Enter') { e.preventDefault(); sendSecret(); } });
    pollingInterval = setInterval(checkNewMessages, 2000);
</script>
</body>
</html>
