<!DOCTYPE html>
<html>
<head>
    <title>🐻 BearGram | Уютный мессенджер</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fbc2eb 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card{
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 48px 40px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.5);
        }
        .logo{
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 56px;
            box-shadow: 0 10px 25px rgba(255,107,107,0.3);
        }
        h1{
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        p{
            color: #666;
            margin-bottom: 32px;
            font-size: 15px;
        }
        .buttons{
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .btn{
            padding: 14px 32px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 15px;
        }
        .btn-primary{
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            color: white;
            box-shadow: 0 4px 15px rgba(255,107,107,0.3);
        }
        .btn-primary:hover{
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255,107,107,0.4);
        }
        .btn-secondary{
            background: rgba(255,255,255,0.8);
            color: #ff6b6b;
            border: 1px solid rgba(255,107,107,0.3);
        }
        .btn-secondary:hover{
            background: white;
            transform: translateY(-3px);
        }
        .bear-icon{
            font-size: 24px;
            margin-top: 24px;
            color: #ffb3b3;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        🐻
    </div>
    <h1>BearGram</h1>
    <p>Уютный мессенджер с плюшевым настроением 💕</p>
    <div class="buttons">
        <a href="/login" class="btn btn-primary">Войти</a>
        <a href="/register" class="btn btn-secondary">Регистрация</a>
    </div>
    <div class="bear-icon">
        🧸 🐻 🎀
    </div>
</div>
</body>
</html>
