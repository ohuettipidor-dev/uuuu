<!DOCTYPE html>
<html>
<head>
    <title>🎤 Голосовые каналы | BearGram</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);font-family:'Segoe UI',sans-serif;min-height:100vh;color:#fff}
        .container{max-width:1000px;margin:0 auto;padding:20px}
        .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;padding-bottom:15px;border-bottom:1px solid rgba(255,255,255,0.1)}
        .header h1{font-size:24px;display:flex;align-items:center;gap:10px}
        .back-btn{background:rgba(255,255,255,0.1);color:white;padding:8px 20px;border-radius:20px;text-decoration:none}
        .create-channel{background:linear-gradient(135deg,#5865F2,#4752C4);border:none;color:white;padding:12px 24px;border-radius:30px;cursor:pointer;margin-bottom:25px;display:flex;align-items:center;gap:8px}
        .channels-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px}
        .channel-card{background:rgba(255,255,255,0.08);border-radius:20px;padding:20px;backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1)}
        .channel-header{display:flex;align-items:center;gap:12px;margin-bottom:15px}
        .channel-icon{width:50px;height:50px;background:#5865F2;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px}
        .channel-info h3{font-size:18px;margin-bottom:4px}
        .channel-info p{font-size:12px;color:#aaa}
        .members-list{margin:15px 0;padding:10px;background:rgba(0,0,0,0.2);border-radius:12px;max-height:120px;overflow-y:auto}
        .member{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:8px;font-size:13px}
        .join-btn{width:100%;background:#5865F2;border:none;color:white;padding:10px;border-radius:12px;cursor:pointer;font-weight:600}
        .join-btn.leave{background:#ed4245}
        .modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:1000;align-items:center;justify-content:center}
        .modal.active{display:flex}
        .modal-content{background:#2c2f33;border-radius:20px;padding:30px;width:90%;max-width:400px}
        .modal-content input{width:100%;padding:12px;margin:15px 0;border-radius:10px;border:none;background:#23272a;color:white}
        .modal-buttons{display:flex;gap:10px}
        .modal-buttons button{flex:1;padding:10px;border:none;border-radius:10px;cursor:pointer}
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🎤 Голосовые каналы</h1>
        <a href="/chat" class="back-btn">← Назад</a>
    </div>
    
    <button class="create-channel" onclick="openCreateModal()">➕ Создать канал</button>
    
    <div class="channels-grid" id="channelsGrid">
        {% for channel in channels %}
        <div class="channel-card" data-channel-id="{{ channel.id }}">
            <div class="channel-header">
                <div class="channel-icon">🎤</div>
                <div class="channel-info">
                    <h3>{{ channel.name }}</h3>
                    <p>👥 {{ channel.member_count }} участников</p>
                </div>
            </div>
            <div class="members-list" id="members-{{ channel.id }}">
                {% for member in channel.members %}
                <div class="member">🔵 {{ member.username }}</div>
                {% endfor %}
            </div>
            {% if channel.is_joined %}
            <button class="join-btn leave" onclick="leaveChannel({{ channel.id }})">🚪 Покинуть</button>
            {% else %}
            <button class="join-btn" onclick="joinChannel({{ channel.id }})">🎤 Подключиться</button>
            {% endif %}
        </div>
        {% endfor %}
    </div>
</div>

<div class="modal" id="createModal">
    <div class="modal-content">
        <h3>Создать голосовой канал</h3>
        <input type="text" id="channelName" placeholder="Название канала">
        <div class="modal-buttons">
            <button onclick="createChannel()">Создать</button>
            <button onclick="closeCreateModal()">Отмена</button>
        </div>
    </div>
</div>

<script>
    function openCreateModal() {
        document.getElementById('createModal').classList.add('active');
    }
    function closeCreateModal() {
        document.getElementById('createModal').classList.remove('active');
    }
    async function createChannel() {
        const name = document.getElementById('channelName').value.trim();
        if(!name) { alert('Введите название'); return; }
        const formData = new FormData();
        formData.append('name', name);
        const response = await fetch('/create_voice_channel', { method: 'POST', body: formData });
        const data = await response.json();
        if(data.success || data.redirect) {
            location.reload();
        } else {
            alert('Ошибка создания');
        }
    }
    async function joinChannel(channelId) {
        const response = await fetch(`/voice/join/${channelId}`, { method: 'POST' });
        const data = await response.json();
        if(data.success) {
            location.reload();
        } else {
            alert(data.error || 'Ошибка подключения');
        }
    }
    async function leaveChannel(channelId) {
        const response = await fetch(`/voice/leave/${channelId}`, { method: 'POST' });
        const data = await response.json();
        if(data.success) {
            location.reload();
        } else {
            alert('Ошибка выхода');
        }
    }
    setInterval(() => { location.reload(); }, 5000);
</script>
</body>
</html>
