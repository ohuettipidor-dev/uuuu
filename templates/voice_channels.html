<!DOCTYPE html>
<html>
<head>
    <title>🎤 Голосовые каналы | BearGram</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
        body{background:linear-gradient(135deg, #1a1a2e, #16213e);min-height:100vh}
        .container{max-width:1200px;margin:0 auto;padding:16px}
        .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-bottom:12px;border-bottom:2px solid #ff6b6b;flex-wrap:wrap;gap:10px}
        .logo{font-size:20px;font-weight:bold;color:white}
        .logo span{color:#ff6b6b}
        .back-btn{background:#ff6b6b;padding:8px 16px;border-radius:25px;color:white;text-decoration:none;font-size:14px}
        .create-btn{background:linear-gradient(135deg,#ff6b6b,#ff8e8e);border:none;color:white;padding:10px 20px;border-radius:30px;cursor:pointer;font-weight:bold}
        
        .channels-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-bottom:30px}
        .channel-card{background:rgba(255,255,255,0.1);backdrop-filter:blur(10px);border-radius:20px;padding:16px;cursor:pointer;transition:0.2s;border:1px solid rgba(255,107,107,0.3)}
        .channel-card:hover{transform:translateY(-2px);background:rgba(255,255,255,0.15)}
        .channel-name{font-size:18px;font-weight:bold;color:white;margin-bottom:5px}
        .channel-stats{font-size:12px;color:#aaa;margin-bottom:10px}
        .member-list{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
        .member-avatar{width:28px;height:28px;border-radius:50%;background:#ff6b6b;display:flex;align-items:center;justify-content:center;font-size:12px;color:white;overflow:hidden}
        .member-avatar img{width:100%;height:100%;object-fit:cover}
        .join-btn{background:#ff6b6b;color:white;border:none;padding:8px 16px;border-radius:25px;margin-top:10px;cursor:pointer;width:100%}
        
        /* МОДАЛЬНОЕ ОКНО КАНАЛА */
        .channel-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:2000;display:none;align-items:center;justify-content:center}
        .channel-modal.active{display:flex}
        .channel-room{background:#1a1a2e;width:100%;max-width:900px;height:80vh;border-radius:28px;display:flex;flex-direction:column;overflow:hidden}
        .channel-room-header{padding:12px 16px;background:#0f0f1a;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #ff6b6b}
        .channel-room-header h3{color:white}
        .leave-btn{background:#ff6b6b;color:white;border:none;padding:6px 12px;border-radius:20px;cursor:pointer}
        
        /* ВИДЕО-КОМНАТА ДЛЯ YOUTUBE */
        .youtube-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);z-index:3000;display:none;flex-direction:column}
        .youtube-modal.active{display:flex}
        .youtube-header{padding:12px 16px;background:#0f0f1a;display:flex;justify-content:space-between;align-items:center}
        .youtube-header input{flex:1;padding:8px 12px;border-radius:25px;border:none;margin:0 10px}
        .youtube-header button{background:#ff6b6b;color:white;border:none;padding:8px 16px;border-radius:25px;cursor:pointer}
        .youtube-iframe{flex:1;width:100%}
        .youtube-chat{width:300px;background:#0f0f1a;display:flex;flex-direction:column}
        .youtube-chat-messages{flex:1;overflow-y:auto;padding:10px}
        .youtube-chat-input{display:flex;padding:10px;gap:5px}
        .youtube-chat-input input{flex:1;padding:8px;border-radius:20px;border:none}
        
        @media (max-width:768px){
            .channels-grid{grid-template-columns:1fr}
            .youtube-chat{width:250px}
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">🐻 Bear<span>Gram</span> 🎤</div>
        <div>
            <button class="create-btn" onclick="openCreateChannelModal()">➕ Создать канал</button>
            <a href="/chat" class="back-btn">← Назад</a>
        </div>
    </div>
    
    <div class="channels-grid" id="channelsGrid">
        <div style="text-align:center;color:#888;padding:40px">Загрузка каналов...</div>
    </div>
</div>

<!-- МОДАЛ СОЗДАНИЯ КАНАЛА -->
<div id="createChannelModal" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:1000;display:none;align-items:center;justify-content:center">
    <div style="background:#1a1a2e;border-radius:28px;padding:24px;width:300px">
        <h3 style="color:white;margin-bottom:16px">🎤 Новый голосовой канал</h3>
        <input type="text" id="channelName" placeholder="Название канала" style="width:100%;padding:12px;border-radius:25px;border:none;margin-bottom:12px">
        <input type="number" id="maxUsers" placeholder="Макс. участников (0=безлимит)" style="width:100%;padding:12px;border-radius:25px;border:none;margin-bottom:12px">
        <label style="color:white;display:flex;align-items:center;gap:8px;margin-bottom:16px">
            <input type="checkbox" id="isPrivate"> 🔒 Приватный канал
        </label>
        <div style="display:flex;gap:10px">
            <button onclick="createChannel()" style="flex:1;background:#ff6b6b;color:white;border:none;padding:10px;border-radius:25px">Создать</button>
            <button onclick="closeCreateModal()" style="flex:1;background:#333;color:white;border:none;padding:10px;border-radius:25px">Отмена</button>
        </div>
    </div>
</div>

<!-- МОДАЛ КАНАЛА (ГОЛОСОВОЙ ЧАТ) -->
<div id="channelModal" class="channel-modal">
    <div class="channel-room">
        <div class="channel-room-header">
            <h3 id="currentChannelName">Голосовой канал</h3>
            <div>
                <button class="leave-btn" onclick="startYouTubeTogether()" style="background:#2ea6ff;margin-right:8px">🎬 YouTube Together</button>
                <button class="leave-btn" onclick="leaveChannel()">🚪 Покинуть</button>
            </div>
        </div>
        <div style="flex:1;display:flex;flex-direction:column;padding:16px">
            <div id="localVideoContainer" style="display:flex;justify-content:center;margin-bottom:16px">
                <video id="localVideo" autoplay muted playsinline style="width:200px;height:150px;background:#000;border-radius:16px;object-fit:cover"></video>
            </div>
            <div style="display:flex;gap:10px;justify-content:center;margin-bottom:16px;flex-wrap:wrap">
                <button id="muteBtn" onclick="toggleMute()" style="background:#ff6b6b;border:none;padding:10px;border-radius:50%;width:50px;height:50px;font-size:20px;cursor:pointer">🎤</button>
                <button id="videoBtn" onclick="toggleVideo()" style="background:#ff6b6b;border:none;padding:10px;border-radius:50%;width:50px;height:50px;font-size:20px;cursor:pointer">📹</button>
                <button onclick="shareScreen()" style="background:#ff6b6b;border:none;padding:10px;border-radius:50%;width:50px;height:50px;font-size:20px;cursor:pointer">🖥️</button>
            </div>
            <div id="remoteVideos" style="display:flex;flex-wrap:wrap;gap:16px;justify-content:center;flex:1;overflow-y:auto;padding:10px">
                <div style="text-align:center;color:#aaa">Участники появятся здесь...</div>
            </div>
            <div style="margin-top:16px;background:#0f0f1a;border-radius:16px;padding:10px;max-height:150px;overflow-y:auto">
                <div id="chatMessages" style="color:#ccc;font-size:12px"></div>
                <div style="display:flex;gap:8px;margin-top:8px">
                    <input type="text" id="voiceChatInput" placeholder="Текстовый чат в канале..." style="flex:1;padding:8px;border-radius:20px;border:none">
                    <button onclick="sendVoiceChatMessage()" style="background:#ff6b6b;border:none;padding:8px 16px;border-radius:20px;cursor:pointer">📨</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- МОДАЛ YOUTUBE TOGETHER -->
<div id="youtubeModal" class="youtube-modal">
    <div class="youtube-header">
        <span style="color:white">🎬 YouTube Together</span>
        <input type="text" id="youtubeUrl" placeholder="Ссылка на YouTube видео или ID...">
        <button onclick="loadYouTubeVideo()">▶ Загрузить</button>
        <button onclick="syncYouTube()" style="background:#4cd964">🔄 Синхронизировать</button>
        <button onclick="closeYouTubeTogether()" style="background:#ff6b6b">✖ Закрыть</button>
    </div>
    <div style="display:flex;flex:1">
        <iframe id="youtubePlayer" class="youtube-iframe" src="" frameborder="0" allowfullscreen></iframe>
        <div class="youtube-chat">
            <div class="youtube-chat-messages" id="youtubeChatMessages">
                <div style="color:#888;text-align:center">💬 Чат для обсуждения видео</div>
            </div>
            <div class="youtube-chat-input">
                <input type="text" id="youtubeChatInput" placeholder="Сообщение...">
                <button onclick="sendYouTubeChat()" style="background:#ff6b6b;border:none;padding:8px 12px;border-radius:20px">📨</button>
            </div>
        </div>
    </div>
</div>

<script>
    let currentChannelId = null;
    let localStream = null;
    let peerConnections = {};
    let currentChannelMembers = {};
    let isMuted = false;
    let isVideoEnabled = true;
    let youtubeSyncInterval = null;
    let currentVideoId = null;
    let signalPollingInterval = null;
    let membersPollingInterval = null;
    
    // ========== ЗАГРУЗКА КАНАЛОВ ==========
    function loadChannels() {
        fetch('/voice/channels/list')
            .then(r => r.json())
            .then(channels => {
                const grid = document.getElementById('channelsGrid');
                if(channels.length === 0) {
                    grid.innerHTML = '<div style="text-align:center;color:#888;padding:40px">🎤 Нет голосовых каналов. Создайте первый!</div>';
                    return;
                }
                grid.innerHTML = '';
                channels.forEach(ch => {
                    const card = document.createElement('div');
                    card.className = 'channel-card';
                    card.innerHTML = `
                        <div class="channel-name">🎤 ${escapeHtml(ch.name)}</div>
                        <div class="channel-stats">👥 ${ch.member_count} участников ${ch.max_users > 0 ? `(макс: ${ch.max_users})` : ''}</div>
                        <div class="member-list" id="members-${ch.id}">
                            ${ch.members.slice(0,5).map(m => `<div class="member-avatar" title="${escapeHtml(m.username)}">${m.username[0]}</div>`).join('')}
                            ${ch.members.length > 5 ? `<div class="member-avatar">+${ch.members.length-5}</div>` : ''}
                        </div>
                        <button class="join-btn" onclick="joinChannel(${ch.id}, '${escapeHtml(ch.name)}')">
                            ${ch.is_joined ? '🔊 В канале' : '🎧 Войти'}
                        </button>
                    `;
                    grid.appendChild(card);
                });
            });
    }
    
    function escapeHtml(t) { if(!t) return ''; const div = document.createElement('div'); div.textContent = t; return div.innerHTML; }
    
    function openCreateChannelModal() { document.getElementById('createChannelModal').style.display = 'flex'; }
    function closeCreateModal() { document.getElementById('createChannelModal').style.display = 'none'; }
    
    function createChannel() {
        const name = document.getElementById('channelName').value.trim();
        const maxUsers = parseInt(document.getElementById('maxUsers').value) || 0;
        const isPrivate = document.getElementById('isPrivate').checked;
        if(!name) { alert('Введите название'); return; }
        
        const fd = new FormData();
        fd.append('name', name);
        fd.append('max_users', maxUsers);
        fd.append('is_private', isPrivate ? 'on' : '');
        
        fetch('/create_voice_channel', {method: 'POST', body: fd})
            .then(() => { closeCreateModal(); loadChannels(); });
    }
    
    // ========== WEBRTC ДЛЯ ГОЛОСОВЫХ КАНАЛОВ ==========
    const configuration = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' }
        ]
    };
    
    async function joinChannel(channelId, channelName) {
        currentChannelId = channelId;
        document.getElementById('currentChannelName').innerText = channelName;
        
        // Запрашиваем доступ к микрофону и камере
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
            document.getElementById('localVideo').srcObject = localStream;
        } catch(e) {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                document.getElementById('localVideo').style.display = 'none';
            } catch(e2) {
                alert('Не удалось получить доступ к микрофону');
                return;
            }
        }
        
        // Отправляем запрос на вход
        const res = await fetch('/voice/join/' + channelId, {method: 'POST'});
        if(!res.ok) { alert('Не удалось войти в канал'); return; }
        
        document.getElementById('channelModal').classList.add('active');
        
        // Запускаем опрос сигналов и участников
        startSignalPolling();
        startMembersPolling();
        
        // Создаём офферы для существующих участников
        setTimeout(() => createOffersForExistingMembers(), 500);
        
        loadChannels();
    }
    
    function startSignalPolling() {
        if(signalPollingInterval) clearInterval(signalPollingInterval);
        
        signalPollingInterval = setInterval(async () => {
            if(!currentChannelId) return;
            
            try {
                // Получаем сигналы от всех участников
                for(const userId of Object.keys(currentChannelMembers)) {
                    const res = await fetch(`/voice/get_signals/${currentChannelId}/${userId}`);
                    const signals = await res.json();
                    
                    if(signals.offer) {
                        await handleOffer(userId, signals.offer);
                    }
                    if(signals.answer) {
                        await handleAnswer(userId, signals.answer);
                    }
                    if(signals.ice) {
                        await handleIceCandidate(userId, signals.ice);
                    }
                }
            } catch(e) {
                console.error('Polling error:', e);
            }
        }, 2000);
    }
    
    function startMembersPolling() {
        if(membersPollingInterval) clearInterval(membersPollingInterval);
        
        membersPollingInterval = setInterval(async () => {
            if(!currentChannelId) return;
            
            try {
                const res = await fetch(`/voice/members/${currentChannelId}`);
                const members = await res.json();
                
                // Добавляем новых участников
                for(const member of members) {
                    if(member.id !== {{ current_user.id }} && !currentChannelMembers[member.id]) {
                        addRemoteUser(member.id, member.username);
                        await createOffer(member.id);
                    }
                }
                
                // Удаляем ушедших
                const currentIds = members.map(m => m.id);
                for(const userId of Object.keys(currentChannelMembers)) {
                    if(!currentIds.includes(parseInt(userId))) {
                        removeRemoteUser(userId);
                    }
                }
            } catch(e) {
                console.error('Members polling error:', e);
            }
        }, 3000);
    }
    
    async function createOffersForExistingMembers() {
        try {
            const res = await fetch(`/voice/members/${currentChannelId}`);
            const members = await res.json();
            
            for(const member of members) {
                if(member.id !== {{ current_user.id }}) {
                    addRemoteUser(member.id, member.username);
                    await createOffer(member.id);
                }
            }
        } catch(e) {
            console.error('Error creating offers:', e);
        }
    }
    
    function addRemoteUser(userId, username) {
        if(peerConnections[userId]) return;
        
        const container = document.getElementById('remoteVideos');
        // Убираем плейсхолдер если есть
        const placeholder = container.querySelector('div[style*="text-align:center"]');
        if(placeholder) placeholder.remove();
        
        const videoDiv = document.createElement('div');
        videoDiv.id = `remote-${userId}`;
        videoDiv.style.cssText = 'position:relative;width:200px;height:150px;background:#000;border-radius:16px;overflow:hidden';
        videoDiv.innerHTML = `
            <video id="video-${userId}" autoplay playsinline style="width:100%;height:100%;object-fit:cover"></video>
            <div style="position:absolute;bottom:5px;left:5px;background:rgba(0,0,0,0.6);color:white;font-size:10px;padding:2px 6px;border-radius:10px">${escapeHtml(username)}</div>
        `;
        container.appendChild(videoDiv);
        
        currentChannelMembers[userId] = username;
    }
    
    function removeRemoteUser(userId) {
        const el = document.getElementById(`remote-${userId}`);
        if(el) el.remove();
        if(peerConnections[userId]) {
            peerConnections[userId].close();
            delete peerConnections[userId];
        }
        delete currentChannelMembers[userId];
        
        // Возвращаем плейсхолдер если никого нет
        const container = document.getElementById('remoteVideos');
        if(Object.keys(currentChannelMembers).length === 0) {
            container.innerHTML = '<div style="text-align:center;color:#aaa">Участники появятся здесь...</div>';
        }
    }
    
    async function createOffer(userId) {
        const pc = new RTCPeerConnection(configuration);
        peerConnections[userId] = pc;
        
        localStream.getTracks().forEach(track => {
            pc.addTrack(track, localStream);
        });
        
        pc.ontrack = (event) => {
            const video = document.getElementById(`video-${userId}`);
            if(video && event.streams[0]) {
                video.srcObject = event.streams[0];
                video.play().catch(e => console.log('Play error:', e));
            }
        };
        
        pc.onicecandidate = (event) => {
            if(event.candidate) {
                sendSignal(userId, { ice: event.candidate });
            }
        };
        
        pc.onnegotiationneeded = async () => {
            try {
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                sendSignal(userId, { sdp: pc.localDescription, type: 'offer' });
            } catch(e) {
                console.error('Negotiation error:', e);
            }
        };
        
        // Принудительно создаём оффер
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        sendSignal(userId, { sdp: offer, type: 'offer' });
    }
    
    async function handleOffer(userId, offer) {
        let pc = peerConnections[userId];
        if(!pc) {
            pc = new RTCPeerConnection(configuration);
            peerConnections[userId] = pc;
            
            localStream.getTracks().forEach(track => {
                pc.addTrack(track, localStream);
            });
            
            pc.ontrack = (event) => {
                const video = document.getElementById(`video-${userId}`);
                if(video && event.streams[0]) {
                    video.srcObject = event.streams[0];
                    video.play().catch(e => console.log('Play error:', e));
                }
            };
            
            pc.onicecandidate = (event) => {
                if(event.candidate) {
                    sendSignal(userId, { ice: event.candidate });
                }
            };
        }
        
        await pc.setRemoteDescription(new RTCSessionDescription(offer));
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        sendSignal(userId, { sdp: answer, type: 'answer' });
    }
    
    async function handleAnswer(userId, answer) {
        const pc = peerConnections[userId];
        if(pc && pc.signalingState !== 'stable') {
            await pc.setRemoteDescription(new RTCSessionDescription(answer));
        }
    }
    
    async function handleIceCandidate(userId, candidate) {
        const pc = peerConnections[userId];
        if(pc) {
            try {
                await pc.addIceCandidate(new RTCIceCandidate(candidate));
            } catch(e) {
                console.error('ICE candidate error:', e);
            }
        }
    }
    
    function sendSignal(toUserId, signal) {
        fetch('/voice/signal', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                channel_id: currentChannelId,
                to_user_id: toUserId,
                ...signal
            })
        }).catch(e => console.error('Signal send error:', e));
    }
    
    function toggleMute() {
        if(localStream) {
            const audioTrack = localStream.getAudioTracks()[0];
            if(audioTrack) {
                audioTrack.enabled = !audioTrack.enabled;
                isMuted = !audioTrack.enabled;
                document.getElementById('muteBtn').innerHTML = isMuted ? '🔇' : '🎤';
                document.getElementById('muteBtn').style.background = isMuted ? '#888' : '#ff6b6b';
                
                // Отправляем статус
                fetch(`/voice/mute/${currentChannelId}`, {method: 'POST'});
            }
        }
    }
    
    function toggleVideo() {
        if(localStream) {
            const videoTrack = localStream.getVideoTracks()[0];
            if(videoTrack) {
                videoTrack.enabled = !videoTrack.enabled;
                isVideoEnabled = videoTrack.enabled;
                document.getElementById('videoBtn').innerHTML = isVideoEnabled ? '📹' : '🚫📹';
                document.getElementById('videoBtn').style.background = isVideoEnabled ? '#ff6b6b' : '#888';
            }
        }
    }
    
    async function shareScreen() {
        try {
            const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
            const videoTrack = screenStream.getVideoTracks()[0];
            
            Object.values(peerConnections).forEach(pc => {
                const sender = pc.getSenders().find(s => s.track && s.track.kind === 'video');
                if(sender) sender.replaceTrack(videoTrack);
            });
            
            videoTrack.onended = () => {
                const cameraTrack = localStream.getVideoTracks()[0];
                Object.values(peerConnections).forEach(pc => {
                    const sender = pc.getSenders().find(s => s.track && s.track.kind === 'video');
                    if(sender && cameraTrack) sender.replaceTrack(cameraTrack);
                });
            };
        } catch(e) { alert('Демонстрация экрана не доступна'); }
    }
    
    function sendVoiceChatMessage() {
        const input = document.getElementById('voiceChatInput');
        const message = input.value.trim();
        if(!message) return;
        
        // Отправляем через HTTP (можно добавить эндпоинт позже)
        addChatMessage('Вы', message);
        input.value = '';
    }
    
    function addChatMessage(username, message) {
        const container = document.getElementById('chatMessages');
        const div = document.createElement('div');
        div.innerHTML = `<strong style="color:#ff6b6b">${escapeHtml(username)}:</strong> ${escapeHtml(message)}`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }
    
    async function leaveChannel() {
        if(signalPollingInterval) clearInterval(signalPollingInterval);
        if(membersPollingInterval) clearInterval(membersPollingInterval);
        
        Object.values(peerConnections).forEach(pc => pc.close());
        peerConnections = {};
        
        if(localStream) {
            localStream.getTracks().forEach(track => track.stop());
        }
        
        if(currentChannelId) {
            await fetch('/voice/leave/' + currentChannelId, {method: 'POST'});
        }
        
        document.getElementById('channelModal').classList.remove('active');
        document.getElementById('remoteVideos').innerHTML = '<div style="text-align:center;color:#aaa">Участники появятся здесь...</div>';
        document.getElementById('chatMessages').innerHTML = '';
        currentChannelId = null;
        currentChannelMembers = {};
        
        loadChannels();
    }
    
    // ========== YOUTUBE TOGETHER ==========
    function startYouTubeTogether() {
        document.getElementById('youtubeModal').classList.add('active');
        document.getElementById('youtubePlayer').src = 'https://www.youtube.com/embed/';
        
        if(youtubeSyncInterval) clearInterval(youtubeSyncInterval);
        youtubeSyncInterval = setInterval(syncYouTubeStatus, 3000);
    }
    
    function loadYouTubeVideo() {
        let url = document.getElementById('youtubeUrl').value.trim();
        let videoId = extractYouTubeId(url);
        
        if(!videoId) {
            alert('Введите корректную ссылку YouTube');
            return;
        }
        
        currentVideoId = videoId;
        const embedUrl = `https://www.youtube.com/embed/${videoId}?enablejsapi=1`;
        document.getElementById('youtubePlayer').src = embedUrl;
    }
    
    function extractYouTubeId(url) {
        if(!url) return null;
        const patterns = [
            /(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&?#]+)/,
            /youtube\.com\/embed\/([^/?]+)/,
            /^[A-Za-z0-9_-]{11}$/
        ];
        for(const pattern of patterns) {
            const match = url.match(pattern);
            if(match) return match[1];
        }
        return null;
    }
    
    function syncYouTube() {
        const iframe = document.getElementById('youtubePlayer');
        if(iframe && iframe.contentWindow) {
            iframe.contentWindow.postMessage(JSON.stringify({
                event: 'command',
                func: 'getCurrentTime',
                args: []
            }), '*');
        }
    }
    
    function sendYouTubeChat() {
        const input = document.getElementById('youtubeChatInput');
        const message = input.value.trim();
        if(!message) return;
        
        addYouTubeChatMessage('Вы', message);
        input.value = '';
    }
    
    function addYouTubeChatMessage(username, message) {
        const container = document.getElementById('youtubeChatMessages');
        const div = document.createElement('div');
        div.style.padding = '4px 0';
        div.style.borderBottom = '1px solid #333';
        div.innerHTML = `<strong style="color:#ff6b6b">${escapeHtml(username)}:</strong> ${escapeHtml(message)}`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }
    
    function syncYouTubeStatus() {
        const iframe = document.getElementById('youtubePlayer');
        if(iframe && iframe.contentWindow && currentVideoId) {
            iframe.contentWindow.postMessage(JSON.stringify({
                event: 'listening',
                id: 'youtube-player'
            }), '*');
        }
    }
    
    function closeYouTubeTogether() {
        document.getElementById('youtubeModal').classList.remove('active');
        if(youtubeSyncInterval) clearInterval(youtubeSyncInterval);
        document.getElementById('youtubePlayer').src = '';
        currentVideoId = null;
    }
    
    window.addEventListener('message', (event) => {
        if(event.data && typeof event.data === 'string') {
            try {
                const data = JSON.parse(event.data);
                if(data.event === 'infoDelivery' && data.info && data.info.currentTime !== undefined) {
                    // Можно синхронизировать с другими
                }
            } catch(e) {}
        }
    });
    
    // Загрузка каналов при старте
    loadChannels();
    setInterval(loadChannels, 5000);
</script>
