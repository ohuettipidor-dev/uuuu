<!-- profile.html -->
<!DOCTYPE html>
<html>
<head><title>Профиль</title><meta charset="UTF-8"></head>
<body style="background:#0e1621;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh">
    <div style="background:#17212b;padding:30px;border-radius:20px;text-align:center">
        <div style="width:100px;height:100px;border-radius:50%;background:#2b5278;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:40px">
            {% if user.avatar != 'default.png' %}
                <img src="/static/avatars/{{ user.avatar }}" style="width:100%;height:100%;border-radius:50%;object-fit:cover">
            {% else %}
                {{ user.username[0].upper() }}
            {% endif %}
        </div>
        <h2>{{ user.username }}</h2>
        <form method="POST" enctype="multipart/form-data">
            <input type="file" name="avatar" accept="image/*" style="margin:10px 0">
            <button type="submit" style="background:#2ea6ff;color:#fff;padding:8px 16px;border:none;border-radius:20px">Загрузить аватар</button>
        </form>
        <a href="/chat" style="display:block;margin-top:20px;color:#2ea6ff">← Назад</a>
    </div>
</body>
</html>
